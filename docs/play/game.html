<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Puzzle Game - Play</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
        }

        h1 {
            color: #667eea;
            margin-bottom: 20px;
            text-align: center;
        }

        .game-section {
            background: #f5f5f5;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            text-align: center;
        }

        .stat-label {
            color: #999;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .stat-value {
            color: #667eea;
            font-size: 1.8em;
            font-weight: bold;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-secondary:hover {
            background: #667eea;
            color: white;
        }

        .instructions {
            background: #fff3cd;
            border: 2px solid #ffc107;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            color: #856404;
        }

        .instructions h3 {
            margin-bottom: 10px;
        }

        .instructions p {
            margin-bottom: 5px;
            font-size: 0.95em;
        }

        .info-box {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 15px;
            border-radius: 5px;
            margin-top: 15px;
            font-size: 0.9em;
            color: #1565c0;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.5em;
            }

            .stats {
                grid-template-columns: 1fr;
            }

            .controls {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 3D Puzzle Game</h1>

        <div class="instructions">
            <h3>📋 ゲーム説明</h3>
            <p>3D 空間に配置された立方体をゴール位置に移動させるパズルゲームです。</p>
            <p>移動数と経過時間を記録してスコアを競います。</p>
        </div>

        <div class="game-section">
            <div class="stats">
                <div class="stat-box">
                    <div class="stat-label">スコア</div>
                    <div class="stat-value" id="score">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">移動数</div>
                    <div class="stat-value" id="moves">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">時間</div>
                    <div class="stat-value" id="time">0.0s</div>
                </div>
            </div>

            <div class="controls">
                <button class="btn btn-primary" onclick="startGame()">🎮 ゲーム開始</button>
                <button class="btn btn-secondary" onclick="resetGame()">🔄 リセット</button>
                <button class="btn btn-secondary" onclick="moveCube(-1, 0, 0)">⬅️ 左</button>
                <button class="btn btn-secondary" onclick="moveCube(1, 0, 0)">➡️ 右</button>
            </div>

            <div class="info-box">
                <strong>💡 ヒント：</strong> 左右のボタンで立方体を移動できます。ゴール位置に到達するとクリアです！
            </div>
        </div>

        <p style="text-align: center; color: #999; margin-top: 20px;">
            <a href="../" style="color: #667eea; text-decoration: none;">← ドキュメントに戻る</a>
        </p>
    </div>

    <script type="module">
        import init, { GameInstance } from './game/wasm_app.js';

        let game = null;

        async function startGame() {
            try {
                console.log('🎮 ゲーム開始します...');
                
                if (!game) {
                    console.log('📦 WASM モジュール読み込み中...');
                    await init();
                    console.log('✅ WASM 初期化完了');
                    
                    game = new GameInstance();
                    console.log('✅ ゲームインスタンス作成完了');
                }

                let lastTime = performance.now();
                let isRunning = true;
                let frameCount = 0;

                function gameLoop(currentTime) {
                    if (!isRunning) return;

                    const dt = Math.min((currentTime - lastTime) / 1000, 0.1);
                    lastTime = currentTime;

                    try {
                        game.update(dt);
                        frameCount++;

                        // UI 更新
                        document.getElementById('score').textContent = game.get_score();
                        document.getElementById('moves').textContent = game.get_moves();
                        document.getElementById('time').textContent = game.get_time().toFixed(1) + 's';

                        if (frameCount % 60 === 0) {
                            console.log(`フレーム: ${frameCount}, スコア: ${game.get_score()}, 移動: ${game.get_moves()}`);
                        }

                        if (game.is_won()) {
                            console.log('🎉 ゲームクリア！');
                            alert('🎉 クリアおめでとうございます！');
                            isRunning = false;
                            return;
                        }

                        requestAnimationFrame(gameLoop);
                    } catch (err) {
                        console.error('ゲームループエラー:', err);
                        isRunning = false;
                    }
                }

                console.log('▶️ ゲームループ開始');
                requestAnimationFrame(gameLoop);
            } catch (err) {
                console.error('❌ ゲーム初期化エラー:', err);
                alert('ゲームの初期化に失敗しました:\n' + err.message);
            }
        }

        function resetGame() {
            if (game) {
                console.log('🔄 ゲームをリセット');
                game.reset();
                document.getElementById('score').textContent = '0';
                document.getElementById('moves').textContent = '0';
                document.getElementById('time').textContent = '0.0s';
            }
        }

        function moveCube(x, y, z) {
            if (game) {
                const success = game.move_cube(x, y, z);
                console.log(`立方体移動: (${x}, ${y}, ${z}) - 成功: ${success}`);
                if (success) {
                    document.getElementById('score').textContent = game.get_score();
                    document.getElementById('moves').textContent = game.get_moves();
                } else {
                    console.log('移動に失敗しました');
                }
            } else {
                console.warn('ゲームがまだ初期化されていません');
            }
        }

        // グローバルに関数をエクスポート
        window.startGame = startGame;
        window.resetGame = resetGame;
        window.moveCube = moveCube;

        console.log('✅ ゲームスクリプト読み込み完了');
    </script>
</body>
</html>
