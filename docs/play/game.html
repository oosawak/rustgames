<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3D Puzzle Game - Play</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .container {
            background: white;
            border-radius: 15px;
            padding: 30px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            max-width: 900px;
            width: 100%;
        }

        h1 {
            color: #667eea;
            margin-bottom: 20px;
            text-align: center;
        }

        .game-section {
            background: #f5f5f5;
            border-radius: 10px;
            padding: 20px;
            margin-bottom: 20px;
        }

        .stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 15px;
            margin-bottom: 20px;
        }

        .stat-box {
            background: white;
            padding: 15px;
            border-radius: 8px;
            border-left: 4px solid #667eea;
            text-align: center;
        }

        .stat-label {
            color: #999;
            font-size: 0.9em;
            margin-bottom: 5px;
        }

        .stat-value {
            color: #667eea;
            font-size: 1.8em;
            font-weight: bold;
        }

        .controls {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            gap: 10px;
            margin-bottom: 20px;
        }

        .btn {
            padding: 12px;
            border: none;
            border-radius: 8px;
            font-size: 1em;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
        }

        .btn-primary {
            background: #667eea;
            color: white;
        }

        .btn-primary:hover {
            background: #5568d3;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }

        .btn-secondary {
            background: #f0f0f0;
            color: #667eea;
            border: 2px solid #667eea;
        }

        .btn-secondary:hover {
            background: #667eea;
            color: white;
        }

        .instructions {
            background: #fff3cd;
            border: 2px solid #ffc107;
            border-radius: 8px;
            padding: 15px;
            margin-bottom: 20px;
            color: #856404;
        }

        .instructions h3 {
            margin-bottom: 10px;
        }

        .instructions p {
            margin-bottom: 5px;
            font-size: 0.95em;
        }

        .info-box {
            background: #e3f2fd;
            border-left: 4px solid #2196f3;
            padding: 15px;
            border-radius: 5px;
            margin-bottom: 15px;
            font-size: 0.9em;
            color: #1565c0;
        }

        .debug-box {
            background: #1e1e1e;
            border: 2px solid #ff6b6b;
            border-radius: 8px;
            padding: 15px;
            margin-top: 20px;
            font-family: 'Courier New', monospace;
            font-size: 0.85em;
            color: #00ff00;
            max-height: 300px;
            overflow-y: auto;
            line-height: 1.4;
        }

        .debug-log-entry {
            margin-bottom: 8px;
            padding: 5px;
            border-bottom: 1px solid #333;
        }

        .debug-log-entry.error {
            color: #ff6b6b;
        }

        .debug-log-entry.success {
            color: #51cf66;
        }

        .debug-log-entry.info {
            color: #4dabf7;
        }

        @media (max-width: 600px) {
            .container {
                padding: 20px;
            }

            h1 {
                font-size: 1.5em;
            }

            .stats {
                grid-template-columns: 1fr;
            }

            .controls {
                grid-template-columns: 1fr;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🎮 3D Puzzle Game</h1>

        <div class="instructions">
            <h3>📋 ゲーム説明</h3>
            <p>3D 空間に配置された立方体をゴール位置に移動させるパズルゲームです。</p>
            <p>移動数と経過時間を記録してスコアを競います。</p>
        </div>

        <div class="game-section">
            <div class="stats">
                <div class="stat-box">
                    <div class="stat-label">スコア</div>
                    <div class="stat-value" id="score">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">移動数</div>
                    <div class="stat-value" id="moves">0</div>
                </div>
                <div class="stat-box">
                    <div class="stat-label">時間</div>
                    <div class="stat-value" id="time">0.0s</div>
                </div>
            </div>

            <div class="controls">
                <button class="btn btn-primary" onclick="startGame()">🎮 ゲーム開始</button>
                <button class="btn btn-secondary" onclick="resetGame()">🔄 リセット</button>
                <button class="btn btn-secondary" onclick="moveCube(-1, 0, 0)">⬅️ 左</button>
                <button class="btn btn-secondary" onclick="moveCube(1, 0, 0)">➡️ 右</button>
            </div>

            <div class="info-box">
                <strong>💡 ヒント：</strong> 左右のボタンで立方体を移動できます。ゴール位置に到達するとクリアです！
            </div>

            <div class="debug-box">
                <strong style="color: #ff6b6b;">🔧 デバッグログ</strong>
                <div id="debugLog"></div>
            </div>
        </div>

        <p style="text-align: center; color: #999; margin-top: 20px;">
            <a href="../" style="color: #667eea; text-decoration: none;">← ドキュメントに戻る</a>
        </p>
    </div>

    <script>
        // グローバル変数
        let gameInstance = null;

        // デバッグログ表示関数
        function debugLog(message, type = 'info') {
            const debugBox = document.getElementById('debugLog');
            if (!debugBox) {
                console.error('debugLog: debugBox element not found');
                return;
            }
            const entry = document.createElement('div');
            entry.className = `debug-log-entry ${type}`;
            const timestamp = new Date().toLocaleTimeString();
            entry.textContent = `[${timestamp}] ${message}`;
            debugBox.appendChild(entry);
            debugBox.scrollTop = debugBox.scrollHeight;
            if (debugBox.children.length > 100) {
                debugBox.removeChild(debugBox.firstChild);
            }
            console.log(message);
        }

        // ゲーム開始関数
        async function startGame() {
            debugLog('🎮 startGame() が呼ばれました！', 'success');
            
            try {
                if (!gameInstance) {
                    debugLog('📦 WASM 初期化中...', 'info');
                    
                    if (!window.wasmReady) {
                        debugLog('⏳ WASM 読み込み完了を待機中...', 'info');
                        // 最大5秒待機
                        for (let i = 0; i < 50; i++) {
                            if (window.wasmReady) break;
                            await new Promise(r => setTimeout(r, 100));
                        }
                        if (!window.wasmReady) {
                            throw new Error('WASM モジュール読み込みタイムアウト');
                        }
                    }

                    debugLog('✅ WASM 準備完了', 'success');
                    await window.wasmInit();
                    debugLog('✅ init() 完了', 'success');
                    
                    gameInstance = new window.GameInstance();
                    debugLog('✅ GameInstance 生成完了', 'success');
                } else {
                    debugLog('♻️ 既存のゲームインスタンスを使用', 'info');
                }

                let lastTime = performance.now();
                let frameCount = 0;

                function gameLoop(currentTime) {
                    const dt = Math.min((currentTime - lastTime) / 1000, 0.1);
                    lastTime = currentTime;

                    try {
                        gameInstance.update(dt);
                        frameCount++;

                        const score = gameInstance.get_score();
                        const moves = gameInstance.get_moves();
                        const time = gameInstance.get_time();
                        
                        document.getElementById('score').textContent = score;
                        document.getElementById('moves').textContent = moves;
                        document.getElementById('time').textContent = time.toFixed(1) + 's';

                        if (frameCount === 1) {
                            debugLog(`▶️ ゲームループ開始`, 'success');
                        }

                        if (frameCount % 60 === 0) {
                            debugLog(`📊 フレーム: ${frameCount}, スコア: ${score}, 移動: ${moves}, 時間: ${time.toFixed(1)}s`, 'info');
                        }

                        if (gameInstance.is_won()) {
                            debugLog('🎉 ゲームクリア！', 'success');
                            alert('🎉 クリアおめでとうございます！');
                            return;
                        }

                        requestAnimationFrame(gameLoop);
                    } catch (err) {
                        debugLog(`❌ ゲームループエラー: ${err.message}`, 'error');
                    }
                }

                debugLog('▶️ ゲームループ開始...', 'info');
                requestAnimationFrame(gameLoop);
            } catch (err) {
                debugLog(`❌ エラー: ${err.message}`, 'error');
            }
        }

        // リセット関数
        function resetGame() {
            debugLog('🔄 resetGame() が呼ばれました', 'info');
            if (gameInstance) {
                try {
                    gameInstance.reset();
                    document.getElementById('score').textContent = '0';
                    document.getElementById('moves').textContent = '0';
                    document.getElementById('time').textContent = '0.0s';
                    debugLog('✅ リセット完了', 'success');
                } catch (err) {
                    debugLog(`❌ リセットエラー: ${err.message}`, 'error');
                }
            } else {
                debugLog('⚠️ ゲームインスタンスがありません', 'error');
            }
        }

        // 立方体移動関数
        function moveCube(x, y, z) {
            debugLog(`⬌ moveCube(${x}, ${y}, ${z}) が呼ばれました`, 'info');
            if (gameInstance) {
                try {
                    const success = gameInstance.move_cube(x, y, z);
                    if (success) {
                        const score = gameInstance.get_score();
                        const moves = gameInstance.get_moves();
                        document.getElementById('score').textContent = score;
                        document.getElementById('moves').textContent = moves;
                        debugLog(`✅ 移動成功! 移動数: ${moves}`, 'success');
                    } else {
                        debugLog('❌ 移動できません', 'error');
                    }
                } catch (err) {
                    debugLog(`❌ 移動エラー: ${err.message}`, 'error');
                }
            } else {
                debugLog('⚠️ ゲームインスタンスがありません。先にゲーム開始してください。', 'error');
            }
        }

        // ページロード時
        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', function() {
                debugLog('📄 ページロード完了', 'success');
                debugLog('⏳ WASM モジュール読み込み中...', 'info');
            });
        } else {
            debugLog('📄 ページロード完了', 'success');
            debugLog('⏳ WASM モジュール読み込み中...', 'info');
        }
    </script>

    <!-- WASM モジュールをロード -->
    <script type="module">
        try {
            const mod = await import('./game/wasm_app.js');
            window.wasmInit = mod.default;
            window.GameInstance = mod.GameInstance;
            window.wasmReady = true;
            
            // debugLog関数が利用可能か確認
            const debugLog = window.debugLog;
            if (debugLog) {
                debugLog('✅ WASM モジュール読み込み完了！', 'success');
                debugLog('📝 「ゲーム開始」ボタンをクリックしてください', 'success');
            }
        } catch (err) {
            console.error('WASM loading error:', err);
            const debugLog = window.debugLog;
            if (debugLog) {
                debugLog(`❌ WASM読み込みエラー: ${err.message}`, 'error');
            }
        }
    </script>
</body>
</html>
