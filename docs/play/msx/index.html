<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>MSX Emulator — RustGames</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #000;
      font-family: monospace;
      color: #0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }
    #top-bar {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 6px 8px 4px;
    }
    h1 { font-size: 15px; letter-spacing: 2px; margin-bottom: 4px; }
    #status { font-size: 11px; color: #0c0; min-height: 1.4em; text-align: center; }
    #btn-row {
      display: flex;
      gap: 6px;
      margin: 5px 0;
      flex-wrap: wrap;
      justify-content: center;
    }
    .rom-btn {
      background: #000;
      color: #0f0;
      border: 1px solid #0f0;
      padding: 5px 12px;
      font-family: monospace;
      font-size: 12px;
      cursor: pointer;
      touch-action: manipulation;
    }
    .rom-btn:active, .rom-btn.active { background: #0f0; color: #000; }
    .eject-btn { border-color: #f80; color: #f80; }
    .eject-btn:active { background: #f80; color: #000; }
    #info { font-size: 10px; color: #060; margin-bottom: 4px; text-align: center; }
    #msx-canvas {
      width: 100%;
      max-width: 100vw;
      aspect-ratio: 4 / 3;
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border-top: 1px solid #0f0;
      border-bottom: 1px solid #0f0;
    }
    #gamepad {
      width: 100%;
      max-width: 600px;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 10px 20px 16px;
      margin-top: auto;
    }
    #dpad {
      display: grid;
      grid-template-columns: repeat(3, 54px);
      grid-template-rows: repeat(3, 54px);
      gap: 3px;
    }
    .dpad-btn {
      background: #111;
      border: 1px solid #0f0;
      border-radius: 6px;
      color: #0f0;
      font-size: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .dpad-btn:active { background: #0f0; color: #000; }
    .dpad-empty { background: transparent; border: none; }
    #action-btns {
      display: grid;
      grid-template-columns: repeat(2, 58px);
      grid-template-rows: repeat(2, 58px);
      gap: 8px;
    }
    .action-btn {
      border-radius: 50%;
      border: 1px solid #0f0;
      background: #111;
      color: #0f0;
      font-family: monospace;
      font-size: 11px;
      font-weight: bold;
      cursor: pointer;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .action-btn:active { background: #0f0; color: #000; }
    #btn-reset { border-color: #f80; color: #f80; }
    #btn-reset:active { background: #f80; color: #000; }
    .action-empty { background: transparent; border: none; }
  </style>
</head>
<body>
  <div id="top-bar">
    <h1>MSX1 EMULATOR</h1>
    <div id="status">Loading...</div>
    <div id="btn-row">
      <button class="rom-btn eject-btn" id="btn-eject">⏏ EJECT</button>
      <button class="rom-btn" id="btn-custom">📂 ROM</button>
    </div>
    <div id="info">ゲームを選んでください</div>
  </div>

  <canvas id="msx-canvas" width="256" height="192"></canvas>

  <div id="gamepad">
    <div id="dpad">
      <div class="dpad-empty"></div>
      <div class="dpad-btn" id="btn-up">▲</div>
      <div class="dpad-empty"></div>
      <div class="dpad-btn" id="btn-left">◀</div>
      <div class="dpad-empty"></div>
      <div class="dpad-btn" id="btn-right">▶</div>
      <div class="dpad-empty"></div>
      <div class="dpad-btn" id="btn-down">▼</div>
      <div class="dpad-empty"></div>
    </div>
    <div id="action-btns">
      <button class="action-btn" id="btn-space">JUMP</button>
      <button class="action-btn" id="btn-enter">START</button>
      <button class="action-btn" id="btn-reset">RESET</button>
      <div class="action-empty"></div>
    </div>
  </div>

  <script type="module">
    import init, * as wasm from './wasm/wasm_app.js';

    const status    = document.getElementById('status');
    const infoEl    = document.getElementById('info');
    const btnRow    = document.getElementById('btn-row');
    const btnEject  = document.getElementById('btn-eject');
    const btnCustom = document.getElementById('btn-custom');

    const BUILTIN_ROMS = [
      { label: '▶ LINEBOY', file: './lineboy.rom', info: '◀▶移動 / JUMP | 星10個でクリア！敵に注意！' },
    ];

    let currentRomData = null;
    let currentRomName = '';
    let audioCtx = null, audioQueue = 0;

    function ensureAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 44100 });
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    async function loadBios() {
      const [r1, r2] = await Promise.all([
        fetch('./cbios/cbios_main_msx1.rom'),
        fetch('./cbios/cbios_sub.rom'),
      ]);
      if (r1.ok) wasm.load_bios_msx(new Uint8Array(await r1.arrayBuffer()));
      if (r2.ok) wasm.load_sub_rom_msx(new Uint8Array(await r2.arrayBuffer()));
    }

    async function resetMsx() {
      ensureAudio();
      wasm.init_msx();
      await loadBios();
      if (currentRomData) {
        wasm.load_rom_msx(currentRomData);
        status.textContent = '🔄 RESET — ▶ ' + currentRomName;
      } else {
        status.textContent = '🔄 RESET';
      }
    }

    function ejectRom() {
      currentRomData = null;
      currentRomName = '';
      document.querySelectorAll('.rom-btn').forEach(b => b.classList.remove('active'));
      wasm.init_msx();
      loadBios().then(() => { status.textContent = '⏏ EJECT — ゲームを選んでください'; });
      infoEl.textContent = 'ゲームを選んでください';
    }

    async function loadRom(data, name) {
      ensureAudio();
      currentRomData = data;
      currentRomName = name;
      wasm.load_rom_msx(data);
      status.textContent = '▶ ' + name + ' 実行中';
    }

    async function main() {
      await init();
      wasm.init_msx();
      try {
        await loadBios();
        status.textContent = 'Ready — ゲームを選んでください';
      } catch (e) {
        status.textContent = 'BIOS error: ' + e.message;
      }

      const canvas    = document.getElementById('msx-canvas');
      const ctx       = canvas.getContext('2d');
      const imageData = ctx.createImageData(256, 192);

      function loop() {
        wasm.tick_msx();
        imageData.data.set(wasm.frame_buffer_msx());
        ctx.putImageData(imageData, 0, 0);
        if (audioCtx) {
          const samples = wasm.audio_samples_msx();
          if (samples.length > 0) {
            const buf = audioCtx.createBuffer(1, samples.length, 44100);
            buf.copyToChannel(samples, 0);
            const src = audioCtx.createBufferSource();
            src.buffer = buf; src.connect(audioCtx.destination);
            const t = Math.max(audioCtx.currentTime, audioCtx.currentTime + audioQueue);
            src.start(t);
            audioQueue = Math.max(0, t - audioCtx.currentTime) + samples.length / 44100;
            audioQueue = Math.max(0, audioQueue - 1 / 60);
          }
        }
        requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);

      document.addEventListener('keydown', e => { ensureAudio(); e.preventDefault(); wasm.key_down_msx(e.code); });
      document.addEventListener('keyup',   e => { e.preventDefault(); wasm.key_up_msx(e.code); });

      // 組み込みROMボタン（JSのみで生成して重複防止）
      for (const rom of BUILTIN_ROMS) {
        const btn = document.createElement('button');
        btn.className = 'rom-btn';
        btn.textContent = rom.label;
        btn.addEventListener('click', async () => {
          ensureAudio();
          document.querySelectorAll('.rom-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          infoEl.textContent = rom.info;
          status.textContent = '読み込み中...';
          const resp = await fetch(rom.file);
          if (!resp.ok) { status.textContent = '取得失敗: ' + resp.status; return; }
          await loadRom(new Uint8Array(await resp.arrayBuffer()), rom.label);
        });
        btnRow.insertBefore(btn, btnEject);
      }

      btnEject.addEventListener('click', ejectRom);
      btnEject.addEventListener('touchstart', e => { e.preventDefault(); ejectRom(); }, { passive: false });

      btnCustom.addEventListener('click', () => {
        const inp = document.createElement('input');
        inp.type = 'file'; inp.accept = '.rom,.ROM,.bin,.BIN';
        inp.onchange = async () => {
          if (!inp.files[0]) return;
          ensureAudio();
          document.querySelectorAll('.rom-btn').forEach(b => b.classList.remove('active'));
          btnCustom.classList.add('active');
          infoEl.textContent = inp.files[0].name;
          await loadRom(new Uint8Array(await inp.files[0].arrayBuffer()), inp.files[0].name);
        };
        inp.click();
      });

      canvas.addEventListener('dragover', e => e.preventDefault());
      canvas.addEventListener('drop', async e => {
        e.preventDefault();
        const f = e.dataTransfer.files[0];
        if (f) await loadRom(new Uint8Array(await f.arrayBuffer()), f.name);
      });

      const padMap = {
        'btn-up':    'ArrowUp',
        'btn-down':  'ArrowDown',
        'btn-left':  'ArrowLeft',
        'btn-right': 'ArrowRight',
        'btn-space': 'Space',
        'btn-enter': 'Enter',
      };
      for (const [id, code] of Object.entries(padMap)) {
        const el = document.getElementById(id);
        if (!el) continue;
        const dn = () => { ensureAudio(); wasm.key_down_msx(code); };
        const up = () => wasm.key_up_msx(code);
        el.addEventListener('touchstart', e => { e.preventDefault(); dn(); }, { passive: false });
        el.addEventListener('touchend',   e => { e.preventDefault(); up(); }, { passive: false });
        el.addEventListener('mousedown', dn);
        el.addEventListener('mouseup', up);
        el.addEventListener('mouseleave', up);
      }

      document.getElementById('btn-reset').addEventListener('click', resetMsx);
      document.getElementById('btn-reset').addEventListener('touchstart', e => { e.preventDefault(); resetMsx(); }, { passive: false });
    }

    main().catch(e => { status.textContent = 'Error: ' + e.message; console.error(e); });
  </script>
</body>
</html>
