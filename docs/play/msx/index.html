<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, user-scalable=no">
  <title>MSX Emulator — RustGames</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    html, body {
      height: 100%;
      background: #000;
      font-family: monospace;
      color: #0f0;
      display: flex;
      flex-direction: column;
      align-items: center;
      overflow-x: hidden;
    }
    #top-bar {
      width: 100%;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 6px 8px 4px;
    }
    h1 { font-size: 15px; letter-spacing: 2px; margin-bottom: 4px; }
    #status { font-size: 11px; color: #0c0; min-height: 1.4em; text-align: center; }
    #btn-row {
      display: flex;
      gap: 6px;
      margin: 5px 0;
      flex-wrap: wrap;
      justify-content: center;
    }
    .rom-btn {
      background: #000;
      color: #0f0;
      border: 1px solid #0f0;
      padding: 5px 12px;
      font-family: monospace;
      font-size: 12px;
      cursor: pointer;
      touch-action: manipulation;
    }
    .rom-btn:active, .rom-btn.active { background: #0f0; color: #000; }
    .eject-btn { border-color: #f80; color: #f80; }
    .eject-btn:active { background: #f80; color: #000; }
    #info { font-size: 10px; color: #060; margin-bottom: 4px; text-align: center; }
    #msx-canvas {
      width: 100vw;
      height: calc(100vw * 3 / 4);
      max-height: 60vh;
      max-width: calc(60vh * 4 / 3);
      display: block;
      image-rendering: pixelated;
      image-rendering: crisp-edges;
      border-top: 1px solid #0f0;
      border-bottom: 1px solid #0f0;
    }
    /* ゲームパッド：画面最下部に固定 */
    #gamepad {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      display: flex;
      justify-content: space-between;
      align-items: flex-end;
      padding: 8px 12px env(safe-area-inset-bottom, 12px);
      background: rgba(0,0,0,0.85);
      border-top: 1px solid #030;
    }
    #dpad {
      display: grid;
      grid-template-columns: repeat(3, 100px);
      grid-template-rows: repeat(3, 100px);
      gap: 4px;
    }
    .dpad-btn {
      background: #111;
      border: 2px solid #0f0;
      border-radius: 14px;
      color: #0f0;
      font-size: 42px;
      display: flex;
      align-items: center;
      justify-content: center;
      cursor: pointer;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
    }
    .dpad-btn:active { background: #0f0; color: #000; }
    .dpad-empty { background: transparent; border: none; }
    .dpad-center {
      background: #222;
      border-radius: 10px;
    }
    /* 中央：START / RESET を横並び */
    #center-btns {
      display: flex;
      flex-direction: row;
      align-items: center;
      gap: 12px;
      padding-bottom: 36px;
    }
    .center-btn {
      background: #111;
      border: 2px solid #666;
      border-radius: 22px;
      color: #aaa;
      font-family: monospace;
      font-size: 13px;
      font-weight: bold;
      width: 88px;
      height: 40px;
      cursor: pointer;
      touch-action: manipulation;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .center-btn:active { background: #666; color: #000; }
    #btn-reset.center-btn { border-color: #f80; color: #f80; }
    #btn-reset.center-btn:active { background: #f80; color: #000; }
    /* 右：A / B ボタン（対角配置） */
    #action-btns {
      display: grid;
      grid-template-columns: repeat(2, 108px);
      grid-template-rows: repeat(2, 108px);
      gap: 10px;
    }
    .action-btn {
      border-radius: 50%;
      border: 2px solid #0f0;
      background: #111;
      color: #0f0;
      font-family: monospace;
      font-size: 26px;
      font-weight: bold;
      cursor: pointer;
      touch-action: none;
      -webkit-tap-highlight-color: transparent;
      user-select: none;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .action-btn:active { background: #0f0; color: #000; }
    #btn-b { border-color: #f55; color: #f55; }
    #btn-b:active { background: #f55; color: #000; }
    .action-empty { background: transparent; border: none; }
    #debug-panel {
      width: 100%;
      background: #001100;
      border-top: 1px solid #030;
      padding: 4px 8px;
      font-size: 10px;
      color: #0a0;
      white-space: pre;
      overflow-x: auto;
      max-height: 120px;
      min-height: 1em;
      overflow-y: auto;
      /* ゲームパッド固定バー分の余白 */
      margin-bottom: 300px;
    }
    #debug-bar {
      width: 100%;
      display: flex;
      justify-content: flex-end;
      background: #001100;
      padding: 2px 8px;
      border-top: 1px solid #030;
    }
    #btn-copy-log {
      background: #000;
      color: #0f0;
      border: 1px solid #0f0;
      font-family: monospace;
      font-size: 10px;
      padding: 2px 8px;
      cursor: pointer;
    }
    #btn-copy-log:active { background: #0f0; color: #000; }
  </style>
</head>
<body>
  <div id="top-bar">
    <h1>MSX1 EMULATOR</h1>
    <div id="status">Loading...</div>
    <div id="btn-row">
      <button class="rom-btn eject-btn" id="btn-eject">⏏ EJECT</button>
      <button class="rom-btn" id="btn-custom">📂 ROM</button>
    </div>
    <div id="info">ゲームを選んでください</div>
  </div>

  <canvas id="msx-canvas" width="256" height="192"></canvas>
  <div id="debug-bar">
    <button id="btn-copy-log">📋 ログをコピー</button>
  </div>
  <div id="debug-panel">デバッグ情報はここに表示されます...</div>

  <div id="gamepad">
    <!-- 左：十字キー -->
    <div id="dpad">
      <div class="dpad-empty"></div>
      <div class="dpad-btn" id="btn-up">▲</div>
      <div class="dpad-empty"></div>
      <div class="dpad-btn" id="btn-left">◀</div>
      <div class="dpad-center"></div>
      <div class="dpad-btn" id="btn-right">▶</div>
      <div class="dpad-empty"></div>
      <div class="dpad-btn" id="btn-down">▼</div>
      <div class="dpad-empty"></div>
    </div>

    <!-- 中央：START / RESET -->
    <div id="center-btns">
      <button class="center-btn" id="btn-enter">START</button>
      <button class="center-btn" id="btn-reset">RESET</button>
    </div>

    <!-- 右：A / B ボタン（B=赤/上、A=緑/下） -->
    <div id="action-btns">
      <div class="action-empty"></div>
      <div class="action-btn" id="btn-b">B</div>
      <div class="action-btn" id="btn-a">A</div>
      <div class="action-empty"></div>
    </div>
  </div>

  <script type="module">
    console.log('[INIT] Module script started');

    let init, wasm;
    try {
      const wasmModule = await import('./wasm/wasm_app.js');
      init = wasmModule.default || wasmModule.init;
      wasm = wasmModule;
      console.log('[INIT] WASM module imported successfully');
    } catch (e) {
      console.error('[INIT] Failed to import WASM module:', e);
      document.getElementById('status').textContent = 'WASM Import Error: ' + e.message;
      throw e;
    }

    // Make wasm globally accessible for console debugging (both window and globalThis)
    globalThis.wasm = wasm;
    window.wasm = wasm;
    console.log('[INIT] WASM module loaded and exposed to global scope');
    console.log('[INIT] typeof globalThis.wasm:', typeof globalThis.wasm);
    console.log('[INIT] typeof window.wasm:', typeof window.wasm);

    const status    = document.getElementById('status');
    const infoEl    = document.getElementById('info');
    const btnRow    = document.getElementById('btn-row');
    const btnEject  = document.getElementById('btn-eject');
    const btnCustom = document.getElementById('btn-custom');

    const BUILTIN_ROMS = [
      { label: '▶ LINEBOY', file: './lineboy.rom', info: '◀▶移動 / JUMP | 星10個でクリア！敵に注意！' },
    ];

    let currentRomData = null;
    let currentRomName = '';
    let audioCtx = null, audioQueue = 0;

    // デバッグログ（モジュールスコープで定義し全関数から参照可能にする）
    const debugEl = document.getElementById('debug-panel');
    const logLines = [];
    function dbgLog(msg) {
      const ts = new Date().toISOString().slice(11,23);
      const line = `[${ts}] ${msg}`;
      logLines.push(line);
      if (logLines.length > 50) logLines.shift();
      debugEl.textContent = logLines.join('\n');
      debugEl.scrollTop = debugEl.scrollHeight;
      console.log('[MSX]', msg);
    }

    function ensureAudio() {
      if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)({ sampleRate: 44100 });
      if (audioCtx.state === 'suspended') audioCtx.resume();
    }

    let isResetting = false;
    let lastResetTime = 0;

    async function fetchBiosData() {
      const [r1, r2] = await Promise.all([
        fetch('./cbios/cbios_main_msx1.rom'),
        fetch('./cbios/cbios_sub.rom'),
      ]);
      return {
        main:   r1.ok ? new Uint8Array(await r1.arrayBuffer()) : null,
        sub:    r2.ok ? new Uint8Array(await r2.arrayBuffer()) : null,
        mainOk: r1.ok, subOk: r2.ok,
      };
    }

    function applyBios(bios) {
      if (bios.main) wasm.load_bios_msx(bios.main);
      if (bios.sub)  wasm.load_sub_rom_msx(bios.sub);
      dbgLog(`BIOS loaded: main=${bios.mainOk} sub=${bios.subOk}`);
    }

    // BIOSブートの120フレームHALT待機をスキップして即座にゲームを起動
    function bootMsx() {
      console.log('[BOOT] bootMsx() started');
      // Use a longer fast-boot to allow C-BIOS to complete cartridge scan on slow devices
      try {
        console.log('[BOOT] Calling fast_boot_msx(1200)');
        wasm.fast_boot_msx(1200);  // 1200フレーム高速実行
        console.log('[BOOT] fast_boot_msx completed');
      } catch (e) {
        console.log('[BOOT] fast_boot_msx error:', e.message);
      }

      // Force cartridge boot: jump directly to INIT if a cartridge is present
      try {
        console.log('[BOOT] Checking boot_cartridge_msx availability');
        console.log('[BOOT] typeof wasm:', typeof wasm);
        console.log('[BOOT] typeof wasm.boot_cartridge_msx:', typeof wasm.boot_cartridge_msx);
        console.log('[BOOT] wasm.boot_cartridge_msx:', wasm.boot_cartridge_msx);

        if (typeof wasm.boot_cartridge_msx === 'function') {
          console.log('[BOOT] Calling boot_cartridge_msx()');
          wasm.boot_cartridge_msx();
          console.log('[BOOT] boot_cartridge_msx() completed');
        } else {
          console.log('[BOOT] boot_cartridge_msx not available (type: ' + typeof wasm.boot_cartridge_msx + ')');
        }
      } catch (e) {
        console.log('[BOOT] boot_cartridge_msx error:', e.message, e);
      }
      console.log('[BOOT] bootMsx() finished');
    }

    async function resetMsx() {
      const now = Date.now();
      if (isResetting || now - lastResetTime < 500) return;
      isResetting = true;
      lastResetTime = now;
      try {
        ensureAudio();
        // BIOSを先にfetch（旧ゲームはそのまま動き続けてOK）
        const bios = await fetchBiosData();
        // fetch完了後に同期的に初期化（ゲームループと競合しない）
        wasm.init_msx();
        applyBios(bios);
        if (currentRomData) {
          wasm.load_rom_msx(currentRomData);
          dbgLog(`RESET with ROM: ▶ ${currentRomName}`);
          status.textContent = '🔄 RESET — ▶ ' + currentRomName;
        } else {
          dbgLog('RESET (no ROM)');
          status.textContent = '🔄 RESET';
        }
        bootMsx();
      } finally {
        isResetting = false;
      }
    }

    function ejectRom() {
      currentRomData = null;
      currentRomName = '';
      document.querySelectorAll('.rom-btn').forEach(b => b.classList.remove('active'));
      fetchBiosData().then(bios => {
        wasm.init_msx();
        applyBios(bios);
        bootMsx();
        status.textContent = '⏏ EJECT — ゲームを選んでください';
      });
      infoEl.textContent = 'ゲームを選んでください';
    }

    async function loadRom(data, name) {
      if (isResetting) return;
      isResetting = true;
      try {
        ensureAudio();
        currentRomData = data;
        currentRomName = name;
        // ROM ロード後に必ず CPU リセット → C-BIOS がカートリッジを再スキャンする
        const bios = await fetchBiosData();
        wasm.init_msx();
        applyBios(bios);
        wasm.load_rom_msx(data);
        // フォールバック：一部環境でC-BIOSがカートリッジ検出に失敗するため
        // ROMロード直後に強制的に slot_select を設定してマッピングを行う
        try {
          if (typeof wasm.force_slot_select === 'function') {
            // 0xC4 = page3=RAM, page2=BIOS, page1=cart, page0=BIOS (common mapping)
            wasm.force_slot_select(0xC4);
            dbgLog('force_slot_select(0xC4) called');
          }
        } catch (e) {
          console.warn('force_slot_select failed', e);
        }
        bootMsx();
        status.textContent = '▶ ' + name + ' 実行中';
        console.log('[MSX] ROM loaded & reset:', name, 'size=', data.length, 'bytes',
                    'magic=', data[0].toString(16), data[1].toString(16));
        dbgLog(`ROM load: ▶ ${name} size=${data.length} magic=${data[0].toString(16)}${data[1].toString(16)}`);
      } finally {
        isResetting = false;
      }
    }

    async function main() {
      console.log('[MAIN] main() started');
      try {
        console.log('[MAIN] Calling init()');
        await init();
        console.log('[MAIN] init() completed');
      } catch (e) {
        console.error('[MAIN] init() failed:', e);
        throw e;
      }

      // Make wasm globally accessible for console debugging
      window.wasm = wasm;
      try {
        console.log('[MAIN] Fetching BIOS data');
        const bios = await fetchBiosData();
        wasm.init_msx();
        applyBios(bios);
        status.textContent = 'Ready — ゲームを選んでください';
      } catch (e) {
        status.textContent = 'BIOS error: ' + e.message;
      }

      const canvas    = document.getElementById('msx-canvas');
      const ctx       = canvas.getContext('2d');
      const imageData = ctx.createImageData(256, 192);

      document.getElementById('btn-copy-log').addEventListener('click', () => {
        navigator.clipboard.writeText(logLines.join('\n')).then(() => {
          document.getElementById('btn-copy-log').textContent = '✅ コピー完了';
          setTimeout(() => { document.getElementById('btn-copy-log').textContent = '📋 ログをコピー'; }, 1500);
        });
      });

      let frameCount = 0;
      function analyzeFrame(buf) {
        let black = 0, nonBlack = 0;
        const colorMap = {};
        for (let i = 0; i < buf.length; i += 4) {
          const r = buf[i], g = buf[i+1], b = buf[i+2];
          if (r === 0 && g === 0 && b === 0) { black++; continue; }
          nonBlack++;
          const key = `rgb(${r},${g},${b})`;
          colorMap[key] = (colorMap[key] || 0) + 1;
        }
        const total = black + nonBlack;
        const topColors = Object.entries(colorMap)
          .sort((a,b) => b[1]-a[1]).slice(0,3)
          .map(([k,v]) => `${k}×${v}`).join(' | ');
        return { black, nonBlack, total, topColors };
      }

      function loop() {
        wasm.tick_msx();
        const fb = wasm.frame_buffer_msx();
        imageData.data.set(fb);
        ctx.putImageData(imageData, 0, 0);

        frameCount++;
        if (frameCount % 60 === 0) {
          const a = analyzeFrame(fb);
          const pct = Math.round(a.nonBlack / a.total * 100);
          dbgLog(`frame=${frameCount} 非黒=${pct}% (${a.nonBlack}px) ${a.topColors || '全黒'}`);
          if (typeof wasm.debug_info_msx === 'function') {
            dbgLog(`VDP: ${wasm.debug_info_msx()}`);
          }
        }
        if (frameCount % 300 === 0) {
          if (typeof wasm.debug_log_msx === 'function') {
            const wasmLog = wasm.debug_log_msx();
            if (wasmLog && wasmLog.trim().length > 0) {
              dbgLog('[WASM DEBUG LOG]');
              wasmLog.split('\n').slice(-10).forEach(line => { if (line.trim()) dbgLog(line); });
            }
          }
        }

        if (audioCtx) {
          const samples = wasm.audio_samples_msx();
          if (samples.length > 0) {
            const buf = audioCtx.createBuffer(1, samples.length, 44100);
            buf.copyToChannel(samples, 0);
            const src = audioCtx.createBufferSource();
            src.buffer = buf; src.connect(audioCtx.destination);
            const t = Math.max(audioCtx.currentTime, audioCtx.currentTime + audioQueue);
            src.start(t);
            audioQueue = Math.max(0, t - audioCtx.currentTime) + samples.length / 44100;
            audioQueue = Math.max(0, audioQueue - 1 / 60);
          }
        }
        requestAnimationFrame(loop);
      }
      requestAnimationFrame(loop);

      document.addEventListener('keydown', e => { ensureAudio(); e.preventDefault(); wasm.key_down_msx(e.code); });
      document.addEventListener('keyup',   e => { e.preventDefault(); wasm.key_up_msx(e.code); });

      // 組み込みROMボタン（JSのみで生成して重複防止）
      let firstRomBtn = null;
      for (const rom of BUILTIN_ROMS) {
        const btn = document.createElement('button');
        btn.className = 'rom-btn';
        btn.textContent = rom.label;
        if (!firstRomBtn) firstRomBtn = btn;
        btn.addEventListener('click', async () => {
          ensureAudio();
          document.querySelectorAll('.rom-btn').forEach(b => b.classList.remove('active'));
          btn.classList.add('active');
          infoEl.textContent = rom.info;
          status.textContent = '読み込み中...';
          const resp = await fetch(rom.file);
          if (!resp.ok) { status.textContent = '取得失敗: ' + resp.status; return; }
          await loadRom(new Uint8Array(await resp.arrayBuffer()), rom.label);
        });
        btnRow.insertBefore(btn, btnEject);
      }

      // Auto-load first ROM (LINEBOY) on page init
      if (firstRomBtn && BUILTIN_ROMS.length > 0) {
        (async () => {
          await new Promise(resolve => setTimeout(resolve, 500));
          const rom = BUILTIN_ROMS[0];
          ensureAudio();
          firstRomBtn.classList.add('active');
          infoEl.textContent = rom.info;
          status.textContent = '読み込み中...';
          const resp = await fetch(rom.file);
          if (resp.ok) {
            await loadRom(new Uint8Array(await resp.arrayBuffer()), rom.label);
          }
        })();
      }

      btnEject.addEventListener('click', ejectRom);
      btnEject.addEventListener('touchstart', e => { e.preventDefault(); ejectRom(); }, { passive: false });

      btnCustom.addEventListener('click', () => {
        const inp = document.createElement('input');
        inp.type = 'file'; inp.accept = '.rom,.ROM,.bin,.BIN';
        inp.onchange = async () => {
          if (!inp.files[0]) return;
          ensureAudio();
          document.querySelectorAll('.rom-btn').forEach(b => b.classList.remove('active'));
          btnCustom.classList.add('active');
          infoEl.textContent = inp.files[0].name;
          await loadRom(new Uint8Array(await inp.files[0].arrayBuffer()), inp.files[0].name);
        };
        inp.click();
      });

      canvas.addEventListener('dragover', e => e.preventDefault());
      canvas.addEventListener('drop', async e => {
        e.preventDefault();
        const f = e.dataTransfer.files[0];
        if (f) await loadRom(new Uint8Array(await f.arrayBuffer()), f.name);
      });

      const padMap = {
        'btn-up':    'ArrowUp',
        'btn-down':  'ArrowDown',
        'btn-left':  'ArrowLeft',
        'btn-right': 'ArrowRight',
        'btn-a':     'Space',    // A = スペース（ジャンプ/決定）
        'btn-b':     'KeyZ',     // B = Z（サブアクション）
        'btn-enter': 'Enter',     // START = Enter
      };
      for (const [id, code] of Object.entries(padMap)) {
        const el = document.getElementById(id);
        if (!el) continue;
        const dn = () => { ensureAudio(); wasm.key_down_msx(code); };
        const up = () => wasm.key_up_msx(code);
        el.addEventListener('touchstart', e => { e.preventDefault(); dn(); }, { passive: false });
        el.addEventListener('touchend',   e => { e.preventDefault(); up(); }, { passive: false });
        el.addEventListener('mousedown', dn);
        el.addEventListener('mouseup', up);
        el.addEventListener('mouseleave', up);
      }

      // touchstart で e.preventDefault() → click イベントが二重発火しない
      document.getElementById('btn-reset').addEventListener('touchstart', e => { e.preventDefault(); resetMsx(); }, { passive: false });
      document.getElementById('btn-reset').addEventListener('click', resetMsx);
    }

    main().catch(e => { status.textContent = 'Error: ' + e.message; console.error(e); });
  </script>
</body>
</html>
