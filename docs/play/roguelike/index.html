<html lang="ja">
<head>
<meta charset="UTF-8">

<style>
* {
  box-sizing: border-box;
}

html, body {
  margin: 0; padding: 0;
  width: 100%; height: 100%;
  background: #000;
  font-family: 'GenInterfaceJP', monospace;
  overflow: hidden;
}

/* ── Main container ── */
#container {
  display: flex;
  width: 100%;
  height: 40vh;
}

/* ── Upper HUD (50%) ── */
#ui-upper {
  display: flex;
  flex-direction: column;
  flex: 0 0 auto;
  overflow-y: auto;
  position: relative;
  transition: flex 0.3s ease;
}

#ui-upper.hidden {
  flex: 0 0 0;
  overflow: hidden;
  display: none;
}

/* ── Canvas area (50%) ── */
#canvas-wrap {
  flex: 1;
  min-height: 0;
  position: relative;
  background: #000;
  transition: flex 0.3s ease;
}

#canvas-wrap.expanded {
  flex: 1;
}

/* UI toggle button */
#ui-toggle-btn {
  position: absolute;
  top: 50px;
  right: 10px;
  z-index: 40;
  padding: 6px 12px;
  background: rgba(0,200,255,0.2);
  border: 1px solid #0ff;
  color: #0ff;
  cursor: pointer;
  border-radius: 3px;
  font-family: monospace;
  font-size: 0.75em;
  display: none;
  transition: top 0.3s ease;
}

#ui-toggle-btn.show {
  display: block;
}

/* ── Status panel ── */
#status-panel {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
  font-size: 0.9em;
}

.stat-item {
  display: flex;
  flex-direction: column;
  gap: 4px;
}

.stat-label {
  color: #0ff;
  font-size: 0.75em;
  text-shadow: 0 0 6px #0ff;
  opacity: 0.7;
  display: flex;
  align-items: center;
  gap: 6px;
}

.stat-label .ra {
  font-size: 1.2em;
  color: #0ff;
  text-shadow: 0 0 4px #0ff;
}

.stat-value {
  color: #0ff;
  font-size: 1.2em;
  font-weight: bold;
  text-shadow: 0 0 8px #0ff;
}

.stat-bar {
  width: 100%;
  height: 12px;
  background: rgba(0, 40, 60, 0.8);
  border: 1px solid rgba(0, 200, 255, 0.3);
  border-radius: 2px;
  overflow: hidden;
}

.stat-bar-fill {
  height: 100%;
  background: linear-gradient(90deg, #00aaff, #00ffff);
  transition: width 0.3s;
  width: 100%;
}

#hp-bar { --hp: 100; }
#mp-bar { --mp: 100; }

/* ── Message log ── */
#message-log {
  border-top: 1px solid rgba(0, 200, 255, 0.2);
  margin-top: 8px;
  padding-top: 8px;
  font-size: 0.8em;
  color: #aaa;
  max-height: 50px;
  overflow-y: auto;
  line-height: 1.4;
}

.msg-text {
  color: #aaf;
  text-shadow: 0 0 4px #0ff;
  margin: 2px 0;
}

/* ── Canvas area (50%) ── */
#canvas-wrap {
  flex: 0 0 50%;
  position: relative;
  width: 100%;
  height: 100%;
  background: #000;
}

#game-canvas {
  width: 100%;
  height: 100%;
  display: block;
}

/* ── Swipe hints ── */
#swipe-hint {
  display: none;
}

#swipe-hint .sh-arrow {
  position: absolute;
  font-size: 2em;
  color: rgba(0, 255, 255, 0.2);
  text-shadow: 0 0 8px rgba(0, 255, 255, 0.3);
  font-weight: bold;
}

#swipe-hint .sh-up    { top: 0; left: 50%; transform: translateX(-50%); }
#swipe-hint .sh-down  { bottom: 0; left: 50%; transform: translateX(-50%); }
#swipe-hint .sh-left  { left: 0; top: 50%; transform: translateY(-50%); }
#swipe-hint .sh-right { right: 0; top: 50%; transform: translateY(-50%); }

#swipe-hint .sh-arrow.flash {
  color: rgba(0, 255, 255, 0.9);
  text-shadow: 0 0 16px rgba(0, 255, 255, 0.8);
  animation: flash 0.2s;
}

@keyframes flash {
  0% { opacity: 1; }
  100% { opacity: 0.3; }
}

/* ── Title screen ── */
#title-screen {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.95);
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
  color: #0ff;
  text-shadow: 0 0 20px #0ff;
}

#title-screen h1 {
  font-size: clamp(2em, 8vw, 3.5em);
  margin: 0 0 16px;
  animation: pulse 0.8s infinite alternate;
}

#title-screen p {
  margin: 8px 0;
  font-size: 1em;
}

#title-screen button {
  margin-top: 24px;
  padding: 12px 32px;
  background: transparent;
  border: 2px solid #0ff;
  color: #0ff;
  font-family: 'GenInterfaceJP', monospace;
  font-size: 1.1em;
  cursor: pointer;
  text-shadow: 0 0 8px #0ff;
  box-shadow: 0 0 16px #0ff;
  border-radius: 4px;
  transition: background 0.2s;
}

#title-screen button:active {
  background: rgba(0, 255, 255, 0.2);
}

@keyframes pulse {
  from { opacity: 0.8; }
  to { opacity: 1; text-shadow: 0 0 30px #0ff, 0 0 60px #0ff; }
}

/* ── Game Over screen ── */
#game-over {
  position: fixed;
  inset: 0;
  background: rgba(0, 0, 0, 0.92);
  display: none;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  z-index: 100;
}

#game-over h2 {
  color: #f44;
  font-size: 2.5em;
  text-shadow: 0 0 20px #f44;
  margin: 0 0 12px;
  animation: pulse 0.5s infinite alternate;
}

#game-over p {
  color: #f88;
  font-size: 1.2em;
  margin-bottom: 24px;
}

#game-over button {
  padding: 12px 32px;
  background: transparent;
  border: 2px solid #f44;
  color: #f44;
  font-family: 'GenInterfaceJP', monospace;
  font-size: 1.1em;
  cursor: pointer;
  text-shadow: 0 0 8px #f44;
  box-shadow: 0 0 16px #f44;
  border-radius: 4px;
  transition: background 0.2s;
}

#game-over button:active {
  background: rgba(244, 68, 68, 0.2);
}

/* ── Loading screen ── */
#loading {
  position: fixed;
  inset: 0;
  background: #000008;
  display: flex;
  align-items: center;
  justify-content: center;
  z-index: 200;
  color: #0ff;
  font-size: 1.2em;
  text-shadow: 0 0 8px #0ff;
}

.spin {
  width: 40px;
  height: 40px;
  border: 3px solid rgba(0, 200, 255, 0.2);
  border-top-color: #0ff;
  border-radius: 50%;
  animation: spin 0.8s linear infinite;
}

@keyframes spin {
  to { transform: rotate(360deg); }
}

/* ── Navigation bar ── */
#nav-bar {
  position: fixed;
  bottom: 0;
  left: 0;
  right: 0;
  height: 50px;
  background: rgba(0, 20, 40, 0.95);
  border-top: 2px solid rgba(0, 200, 255, 0.4);
  display: none;
  justify-content: space-around;
  align-items: center;
  z-index: 100;
}

.nav-btn {
  flex: 1;
  height: 100%;
  border: none;
  background: transparent;
  color: rgba(0, 200, 255, 0.6);
  font-family: 'GenInterfaceJP', monospace;
  font-size: 0.7em;
  cursor: pointer;
  text-shadow: 0 0 4px rgba(0, 200, 255, 0.3);
  transition: all 0.2s;
  border-bottom: 3px solid transparent;
  white-space: nowrap;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 4px;
}

.nav-btn .ra {
  font-size: 1.3em;
  color: rgba(0, 200, 255, 0.6);
  transition: color 0.2s;
}

.nav-btn:hover {
  color: #0ff;
  text-shadow: 0 0 8px #0ff;
}

.nav-btn:hover .ra {
  color: #0ff;
}

.nav-btn.active {
  color: #0ff;
  text-shadow: 0 0 8px #0ff;
  border-bottom-color: #0ff;
}

.nav-btn.active .ra {
  color: #0ff;
}
  background: rgba(0, 255, 255, 0.05);
}

/* ── Tab panels ── */
#tab-content {
  background: rgba(0, 0, 20, 0.8);
  border-bottom: 2px solid rgba(0, 200, 255, 0.3);
  overflow-y: auto;
  padding: 12px;
  display: none;
}

.tab-panel {
  display: none;
  padding: 16px;
  color: #aaf;
  font-size: 0.9em;
  line-height: 1.6;
  width: 100%;
}

.tab-panel.active {
  display: block;
}

/* ── Portrait mode (default) ── */
@media (orientation: portrait) {
  #container {
    flex-direction: column;
  }

  #tab-content {
    order: -1;
    flex: 0 0 40%;
    display: flex;
    position: static;
  }

  #canvas-wrap {
    flex: 1;
    order: 0;
    min-height: 0;
    /* container(40vh) と nav-bar(50px) を除いた残り */
    height: calc(60vh - 50px);
  }

  #nav-bar {
    order: 1;
    height: 50px;
  }
}

.tab-panel {
  display: none;
  padding: 16px;
  color: #aaf;
  font-size: 0.9em;
  line-height: 1.6;
  width: 100%;
}

.tab-panel.active {
  display: block;
}

/* ── Mobile responsive ── */
@media (max-width: 768px) {
  #ui-upper {
    flex: 0 0 45%;
  }
  #canvas-wrap {
    flex: 0 0 55%;
  }

  #status-panel {
    grid-template-columns: 1fr;
    gap: 8px;
  }

  #nav-bar {
    height: 45px;
  }

}

@media (orientation: landscape) {
  #container {
    flex-direction: row;
  }

  #ui-upper {
    display: none;
  }

  #status-panel {
    grid-template-columns: 1fr;
  }

  #tab-content {
    position: fixed;
    left: 0;
    top: 0;
    width: 50%;
    height: 100%;
    border-right: 2px solid rgba(0, 200, 255, 0.3);
    display: flex;
    flex-direction: column;
    padding-top: 0;
    order: auto;
    z-index: 0;
  }

  #canvas-wrap {
    position: fixed;
    top: 0;
    right: 0;
    width: 50% !important;
    height: calc(100% - 50px) !important;
    order: auto;
    z-index: 1;
  }

  #nav-bar {
    position: fixed;
    bottom: 0;
    right: 0;
    width: 50%;
    height: 50px;
    border-top: 2px solid rgba(0, 200, 255, 0.4);
    border-left: 2px solid rgba(0, 200, 255, 0.4);
    flex-direction: row;
  }

  .tab-panel {
    display: none;
    flex: 1;
    overflow-y: auto;
    padding: 16px;
  }

  .tab-panel.active {
    display: block;
  }
}

/* ── Message Log ── */
#message-log {
  position: fixed;
  bottom: 60px;
  left: 120px;
  right: 120px;
  z-index: 40;
  max-height: 140px;
  overflow-y: auto;
  background: rgba(0, 0, 0, 0.85);
  border: 1px solid rgba(0, 200, 255, 0.6);
  border-radius: 4px;
  padding: 12px;
  font-family: monospace;
  font-size: 0.8em;
  color: #0ff;
  display: none;
  text-shadow: 0 0 6px #0ff;
  line-height: 1.4;
  text-align: left;
}

/* ── Responsive Message Log (Portrait) ── */
@media (max-aspect-ratio: 1/1), (max-width: 768px) {
  #message-log {
    left: 140px;
    right: 100px;
    max-height: 120px;
    font-size: 0.75em;
    padding: 10px;
  }
}

/* ── Very narrow screens (small phones) ── */
@media (max-width: 480px) {
  #message-log {
    left: 20px;
    right: 20px;
    max-height: 100px;
    font-size: 0.7em;
    padding: 8px;
  }
}
</style>

<script type="module">
import init, * as wasm from './wasm/wasm_roguelike.js';
import { FontLoader, AudioEngine, InputManager } from '../../engine.js';

// ── Constants ──────────────────────────────────────────
const KEYMAP = {
  ArrowUp: 0,    KeyW: 0,
  ArrowDown: 3,  KeyS: 3,
  ArrowLeft: 1,  KeyA: 1,
  ArrowRight: 2, KeyD: 2,
};

// ── Engine instances ──────────────────────────────────
const audio = new AudioEngine();
const input = new InputManager({ swipeMin: 35 });

// ── State ─────────────────────────────────────────────
let initialized = false;

// ── Init ──────────────────────────────────────────────
async function start() {
  try {
    await init();

    // Load font
    await FontLoader.load('GenInterfaceJP', wasm);

    // Initialize game
    wasm.init_roguelike();

    document.getElementById('loading').style.display = 'none';
    initialized = true;

    // Setup input
    input.onAction(action => {
      if (initialized) {
        wasm.move_roguelike(action);
      }
    });

    input.bindKeyboard(KEYMAP);
    input.bindSwipe(['#ui-upper', '#canvas-wrap'], {
      onStart: () => audio.ensure(),
      onHint: flashHint,
    });

    // Setup buttons
    document.getElementById('btn-start').addEventListener('click', () => {
      audio.ensure();
      document.getElementById('title-screen').style.display = 'none';
      document.getElementById('nav-bar').style.display = 'flex';
      document.getElementById('movement-joystick').style.display = 'flex';
      document.getElementById('magic-button').style.display = 'block';
      document.getElementById('ui-toggle-btn').classList.add('show');

      const isLandscape = window.innerHeight < window.innerWidth;

      if (isLandscape) {
        const uiUpper = document.getElementById('ui-upper');
        if (uiUpper) {
          uiUpper.style.display = 'flex';
        }
        // Tab toggle button removed
      }

      wasm.start_game_roguelike();
    });

    document.getElementById('btn-retry').addEventListener('click', () => {
      document.getElementById('game-over').style.display = 'none';
      document.getElementById('movement-joystick').style.display = 'flex';
      document.getElementById('magic-button').style.display = 'block';
      document.getElementById('ui-toggle-btn').classList.add('show');
      wasm.start_game_roguelike();
    });

    // Movement joystick swipe detection
    const joystick = document.getElementById('movement-joystick');
    let joystickTouchStart = { x: 0, y: 0 };

    joystick.addEventListener('touchstart', (e) => {
      const touch = e.touches[0];
      joystickTouchStart = { x: touch.clientX, y: touch.clientY };
    });

    joystick.addEventListener('touchend', (e) => {
      if (e.changedTouches.length === 0) return;
      const touch = e.changedTouches[0];
      const dx = touch.clientX - joystickTouchStart.x;
      const dy = touch.clientY - joystickTouchStart.y;
      const distance = Math.sqrt(dx * dx + dy * dy);

      if (distance < 10) return; // Minimum swipe distance

      const angle = Math.atan2(dy, dx);
      // 0=right, π/2=down, π/-π=left, -π/2=up
      if (angle > -Math.PI / 4 && angle < Math.PI / 4) {
        wasm.move_roguelike(2); // right
      } else if (angle >= Math.PI / 4 && angle < 3 * Math.PI / 4) {
        wasm.move_roguelike(3); // down
      } else if (angle >= 3 * Math.PI / 4 || angle < -3 * Math.PI / 4) {
        wasm.move_roguelike(1); // left
      } else {
        wasm.move_roguelike(0); // up
      }
    });


    // Movement joystick buttons with continuous movement
    let pressedButtons = new Set();
    let moveInterval = null;
    let shiftPressed = false;
    const MOVE_SPEED = 200; // 200ms between moves

    const buttons = [
      { id: 'btn-up', action: 0 },
      { id: 'btn-left', action: 1 },
      { id: 'btn-right', action: 2 },
      { id: 'btn-down', action: 3 }
    ];

    // Track Shift key state
    document.addEventListener('keydown', (e) => {
      if (e.key === 'Shift') {
        shiftPressed = true;
      }
    });

    document.addEventListener('keyup', (e) => {
      if (e.key === 'Shift') {
        shiftPressed = false;
      }
    });

    const startContinuousMove = () => {
      if (moveInterval) clearInterval(moveInterval);
      moveInterval = setInterval(() => {
        // Don't move if Shift key is pressed (reserved for magic)
        if (initialized && pressedButtons.size > 0 && !shiftPressed) {
          // Move in the last pressed direction
          const lastButton = Array.from(pressedButtons)[pressedButtons.size - 1];
          const btn = buttons.find(b => b.id === lastButton);
          if (btn) wasm.move_roguelike(btn.action);
        }
      }, MOVE_SPEED);
    };

    buttons.forEach(btn => {
      const element = document.getElementById(btn.id);
      element.addEventListener('mousedown', (e) => {
        e.preventDefault();
        pressedButtons.add(btn.id);
        startContinuousMove();
      });
      element.addEventListener('touchstart', (e) => {
        e.preventDefault();
        pressedButtons.add(btn.id);
        startContinuousMove();
      });
    });

    // Handle mouseup and touchend globally
    document.addEventListener('mouseup', () => {
      pressedButtons.clear();
      if (moveInterval) clearInterval(moveInterval);
      moveInterval = null;
    });

    document.addEventListener('touchend', () => {
      pressedButtons.clear();
      if (moveInterval) clearInterval(moveInterval);
      moveInterval = null;
    });

    // Magic button
    const magicButton = document.getElementById('magic-button');
    magicButton.addEventListener('click', () => {
      if (initialized) wasm.move_roguelike(4);
    });
    magicButton.addEventListener('touchstart', (e) => {
      e.preventDefault();
      if (initialized) wasm.move_roguelike(4);
    });

    // Swap buttons position
    let swapped = false;
    function toggleSwap() {
      swapped = !swapped;
      const joystick = document.getElementById('movement-joystick');
      const magic = document.getElementById('magic-button');

      if (swapped) {
        joystick.style.left = '10px';
        joystick.style.right = 'auto';
        magic.style.right = '10px';
        magic.style.left = 'auto';
      } else {
        joystick.style.right = '10px';
        joystick.style.left = 'auto';
        magic.style.left = '10px';
        magic.style.right = 'auto';
      }
    }

    const navSwapButton = document.getElementById('nav-swap-button');
    navSwapButton.addEventListener('click', (e) => {
      e.preventDefault();
      toggleSwap();
    });

    // Setup navigation tabs
    setupNavigation();

    // Spacebar for magic
    document.addEventListener('keydown', (e) => {
      if (e.code === 'Space' && initialized) {
        e.preventDefault();
        wasm.move_roguelike(4);  // magic attack in player direction
      }
    });

    requestAnimationFrame(gameLoop);
  } catch (e) {
    console.error('Failed to initialize:', e);
    document.getElementById('loading').innerHTML = 'エラーが発生しました: ' + e.message;
  }
}

// ── Game loop ──────────────────────────────────────
function gameLoop() {
  if (!initialized) return;

  wasm.tick_roguelike(performance.now());

  // Get canvas dimensions and update canvas size
  const wrap = document.getElementById('canvas-wrap');
  if (wrap) {
    const w = wrap.offsetWidth || 1280;
    const h = wrap.offsetHeight || 800;

    if (is3dMode) {
      // Render 3D
      render3d();
    } else {
      // Render 2D via WASM
      // Update canvas buffer size to match container
      const canvas2d = document.getElementById('game-canvas');
      if (canvas2d.width !== w || canvas2d.height !== h) {
        canvas2d.width = w;
        canvas2d.height = h;
      }
      wasm.render_roguelike('game-canvas', w, h);
    }
  }

  // Update UI
  updateStatus();

  // Update message log
  updateMessageLog();

  // Update MAP, EQUIPMENT, or ITEMS if open
  const activeTab = document.querySelector('.nav-btn.active');
  if (activeTab) {
    const tabName = activeTab.getAttribute('data-tab');
    if (tabName === 'map') {
      drawDungeonMap();
    } else if (tabName === 'equipment') {
      updateEquipmentDisplay();
    } else if (tabName === 'items') {
      updateItemsDisplay();
    }
  }

  requestAnimationFrame(gameLoop);
}

// ── Draw dungeon map ──────────────────────────────
let lastPlayerTile = -1;  // Track previous tile value for room entry/exit detection

function drawDungeonMap() {
  const canvas = document.getElementById('dungeon-map');
  if (!canvas) return;

  const ctx = canvas.getContext('2d');
  const rect = canvas.getBoundingClientRect();
  canvas.width = rect.width;
  canvas.height = rect.height;

  // Get map data from WASM
  const mapWidth = wasm.map_width_roguelike();
  const mapHeight = wasm.map_height_roguelike();
  const playerX = wasm.player_x_roguelike();
  const playerY = wasm.player_y_roguelike();
  const mapData = wasm.map_data_roguelike();

  // Draw background
  ctx.fillStyle = '#000';
  ctx.fillRect(0, 0, canvas.width, canvas.height);

  // Calculate cell size
  const cellW = canvas.width / mapWidth;
  const cellH = canvas.height / mapHeight;

  // Get visited data
  const visitedData = wasm.visited_data_roguelike();

  // Check if player is in a room
  // Check if player is in a room
  let roomTiles = new Set();
  let currentPlayerTile = -1;

  if (playerX >= 0 && playerX < mapWidth && playerY >= 0 && playerY < mapHeight) {
    const playerIdx = playerY * mapWidth + playerX;
    const playerTile = mapData[playerIdx];
    currentPlayerTile = playerTile;

    // Detect room entry/exit
    if (lastPlayerTile !== currentPlayerTile) {
      if (playerTile === 2 && lastPlayerTile !== 2) {
        console.log('部屋に入った');
      } else if (playerTile !== 2 && lastPlayerTile === 2) {
        console.log('部屋から出た');
      }
    }

    if (playerTile === 2) {
      // Player is in a room, find all room tiles connected to player
      const queue = [[playerX, playerY]];
      const visited = new Set();
      visited.add(`${playerX},${playerY}`);

      while (queue.length > 0) {
        const [x, y] = queue.shift();
        roomTiles.add(`${x},${y}`);

        // Check 4 adjacent tiles
        for (const [dx, dy] of [[0,1], [0,-1], [1,0], [-1,0]]) {
          const nx = x + dx;
          const ny = y + dy;
          const key = `${nx},${ny}`;

          if (nx >= 0 && nx < mapWidth && ny >= 0 && ny < mapHeight && !visited.has(key)) {
            const idx = ny * mapWidth + nx;
            if (mapData[idx] === 2) {
              visited.add(key);
              queue.push([nx, ny]);
            }
          }
        }
      }
    }
  }

  // Draw all visited tiles
  for (let y = 0; y < mapHeight; y++) {
    for (let x = 0; x < mapWidth; x++) {
      const idx = y * mapWidth + x;
      const isVisited = visitedData[idx] === 1;
      if (!isVisited) continue;

      const tile = mapData[idx];
      let color;
      if (tile === 1) color = '#555';      // Wall
      else if (tile === 2) color = '#3a5'; // Room
      else if (tile === 3) color = '#dd0'; // StairDown
      else if (tile === 4) color = '#0dd'; // StairUp
      else color = '#4a6';                 // Floor

      // Brighten room tiles if player is in a room
      if (roomTiles.has(`${x},${y}`)) {
        if (tile === 1) color = '#888';
        else if (tile === 2) color = '#6e8';
        else if (tile === 3) color = '#ff0';
        else if (tile === 4) color = '#0ff';
        else color = '#7b9';
      }

      ctx.fillStyle = color;
      ctx.fillRect(x * cellW, y * cellH, cellW, cellH);
    }
  }

  // Draw player
  ctx.fillStyle = '#0f0';
  ctx.fillRect(playerX * cellW + 2, playerY * cellH + 2, cellW - 4, cellH - 4);

  // Draw label
  ctx.fillStyle = '#0ff';
  ctx.font = '12px monospace';
  ctx.fillText(`F${wasm.depth_roguelike()}`, 8, 20);

  // Update last player tile for next frame
  lastPlayerTile = currentPlayerTile;
}

// ── 3D Rendering with Three.js ──
let scene, camera, renderer;
let cubes = [];
let playerCube, enemies3d = [];
let is3dMode = false;
let playerModel = null;   // VRM model (loaded async)
let playerVrm = null;     // VRM instance (for update)
let playerModelYOffset = 0;
let vrmLoading = false;

function setupPlayerModel(obj) {
  // Normalize model height to ~1.4 tiles and put its feet on the floor
  const box = new THREE.Box3().setFromObject(obj);
  const size = box.getSize(new THREE.Vector3());
  const s = size.y > 0 ? 1.4 / size.y : 1;
  obj.scale.setScalar(s);
  playerModelYOffset = -box.min.y * s;
  playerModel = obj;
}

function loadPlayerVrm() {
  if (playerModel || vrmLoading || typeof THREE.GLTFLoader === 'undefined') return;
  vrmLoading = true;
  const loader = new THREE.GLTFLoader();
  loader.load('./vrm/standard.vrm', (gltf) => {
    if (window.THREE_VRM && THREE_VRM.VRM) {
      THREE_VRM.VRM.from(gltf).then((vrm) => {
        playerVrm = vrm;
        setupPlayerModel(vrm.scene);
      }).catch(() => {
        // VRM 1.0 file: three-vrm 0.x can't parse it, but the raw glTF renders fine
        setupPlayerModel(gltf.scene);
      });
    } else {
      setupPlayerModel(gltf.scene);
    }
  }, undefined, (e) => {
    console.warn('VRM load failed, keeping box player:', e);
    // Don't retry: once failed, consider it done
  });
}

function init3d() {
  const canvas3d = document.getElementById('game-canvas-3d');
  const wrap = document.getElementById('canvas-wrap');

  let width = wrap.offsetWidth || 1280;
  let height = wrap.offsetHeight || 800;

  // Set canvas size explicitly
  canvas3d.setAttribute('width', width);
  canvas3d.setAttribute('height', height);

  renderer = new THREE.WebGLRenderer({ canvas: canvas3d, antialias: true });

  scene = new THREE.Scene();
  scene.background = new THREE.Color(0x000008);

  camera = new THREE.PerspectiveCamera(75, width / height, 0.1, 1000);
  camera.position.set(0, 40, 80);
  camera.lookAt(0, 10, 0);

  renderer.setSize(width, height, false);
  renderer.setPixelRatio(window.devicePixelRatio);

  // Add light
  const light = new THREE.DirectionalLight(0xffffff, 0.8);
  light.position.set(50, 50, 50);
  scene.add(light);

  const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
  scene.add(ambientLight);

  // Start loading the player VRM model (async, box shown until ready)
  loadPlayerVrm();

  // Handle window resize
  window.addEventListener('resize', () => {
    if (!renderer) return;
    const newWidth = wrap.offsetWidth;
    const newHeight = wrap.offsetHeight;
    camera.aspect = newWidth / newHeight;
    camera.updateProjectionMatrix();
    renderer.setSize(newWidth, newHeight);
  });
}

function updateDungeon3d() {
  if (!scene) init3d();

  // Clear existing cubes (dispose geometry and material)
  cubes.forEach(cube => {
    scene.remove(cube);
    cube.geometry.dispose();
    cube.material.dispose();
  });
  cubes = [];
  if (playerCube) {
    scene.remove(playerCube);
    playerCube.geometry.dispose();
    playerCube.material.dispose();
    playerCube = null;
  }
  enemies3d.forEach(e => {
    scene.remove(e);
    e.geometry.dispose();
    e.material.dispose();
  });
  enemies3d = [];

  const mapWidth = wasm.map_width_roguelike();
  const mapHeight = wasm.map_height_roguelike();
  const playerX = wasm.player_x_roguelike();
  const playerY = wasm.player_y_roguelike();
  const mapData = wasm.map_data_roguelike();

  // Draw only the viewport around the player (same idea as the 2D canvas)
  const viewRadius = 12;
  const minX = Math.max(0, playerX - viewRadius);
  const maxX = Math.min(mapWidth - 1, playerX + viewRadius);
  const minY = Math.max(0, playerY - viewRadius);
  const maxY = Math.min(mapHeight - 1, playerY + viewRadius);

  for (let y = minY; y <= maxY; y++) {
    for (let x = minX; x <= maxX; x++) {
      const idx = y * mapWidth + x;
      const tile = mapData[idx];

      let color = 0x555577;  // Floor (corridor)
      let h = 0.2;

      if (tile === 1) { // Wall
        color = 0x333344;
        h = 2.0;
      } else if (tile === 2) { // Room
        color = 0x446688;
        h = 0.2;
      } else if (tile === 3) { // StairDown
        color = 0xdddd00;
        h = 0.5;
      } else if (tile === 4) { // StairUp
        color = 0x00dddd;
        h = 0.5;
      }

      const geom = new THREE.BoxGeometry(1, h, 1);
      const mat = new THREE.MeshLambertMaterial({ color });
      const cube = new THREE.Mesh(geom, mat);
      // World coords: tile x -> world X, tile y -> world Z
      cube.position.set(x, h / 2, y);
      scene.add(cube);
      cubes.push(cube);
    }
  }

  // Draw player: VRM model if loaded, otherwise a green box
  if (playerModel) {
    // Ensure model is in scene exactly once
    if (playerModel.parent !== scene) {
      if (playerModel.parent) playerModel.parent.remove(playerModel);
      scene.add(playerModel);
    }
    playerModel.position.set(playerX, 0.2 + playerModelYOffset, playerY);
    // Face the direction of movement (0=up/-Z, 1=left/-X, 2=right/+X, 3=down/+Z)
    const dir = wasm.player_direction_roguelike();
    const dirToRot = { 0: Math.PI, 1: -Math.PI / 2, 2: Math.PI / 2, 3: 0 };
    playerModel.rotation.y = dirToRot[dir] ?? 0;
    if (playerVrm) playerVrm.update(1 / 60);
  } else {
    const playerGeom = new THREE.BoxGeometry(0.7, 1.4, 0.7);
    const playerMat = new THREE.MeshLambertMaterial({ color: 0x00ff00 });
    playerCube = new THREE.Mesh(playerGeom, playerMat);
    playerCube.position.set(playerX, 0.9, playerY);
    scene.add(playerCube);
  }

  // Draw enemies (red boxes)
  const enemyCount = wasm.enemy_count_roguelike();
  for (let i = 0; i < enemyCount; i++) {
    const data = wasm.enemy_data_roguelike(i);
    if (data.length < 3) continue;

    const ex = data[0];
    const ey = data[1];
    // Only draw enemies inside the viewport
    if (ex < minX || ex > maxX || ey < minY || ey > maxY) continue;

    const enemyGeom = new THREE.BoxGeometry(0.6, 1.1, 0.6);
    const enemyMat = new THREE.MeshLambertMaterial({ color: 0xff4444 });
    const enemyCube = new THREE.Mesh(enemyGeom, enemyMat);
    enemyCube.position.set(ex, 0.75, ey);
    scene.add(enemyCube);
    enemies3d.push(enemyCube);
  }

  // Camera follows the player: above and behind, looking ahead of the player
  camera.position.set(playerX, 7, playerY + 6);
  camera.lookAt(playerX, 0.8, playerY - 2);
}

let init3dAttempted = false;

function render3d() {
  if (!renderer) {
    if (init3dAttempted) return;  // already tried once this session, don't hammer context creation every frame
    init3dAttempted = true;
    init3d();
  }
  if (!renderer) return;

  // Keep renderer size in sync with the visible canvas area
  const wrap = document.getElementById('canvas-wrap');
  const w = wrap.offsetWidth || 1280;
  const h = wrap.offsetHeight || 800;
  const size = new THREE.Vector2();
  renderer.getSize(size);
  if (size.x !== w || size.y !== h) {
    renderer.setSize(w, h, false);
    camera.aspect = w / h;
    camera.updateProjectionMatrix();
  }

  updateDungeon3d();
  renderer.render(scene, camera);
}

// 2D/3D toggle function
function toggleViewMode() {
  is3dMode = !is3dMode;
  const canvas2d = document.getElementById('game-canvas');
  const canvas3d = document.getElementById('game-canvas-3d');
  const btn = document.getElementById('view-toggle');

  if (is3dMode) {
    canvas2d.style.display = 'none';
    canvas3d.style.display = 'block';
    btn.textContent = '2D';
    render3d();
  } else {
    canvas2d.style.display = 'block';
    canvas3d.style.display = 'none';
    btn.textContent = '3D';
  }
}

// Attach toggle to canvas button
document.getElementById('view-toggle').addEventListener('click', toggleViewMode);

// UI toggle button
document.getElementById('ui-toggle-btn').addEventListener('click', () => {
  const uiUpper = document.getElementById('ui-upper');
  const canvasWrap = document.getElementById('canvas-wrap');
  const btn = document.getElementById('ui-toggle-btn');
  const isLandscape = window.innerHeight < window.innerWidth;

  if (uiUpper.classList.contains('hidden')) {
    // Show UI
    uiUpper.classList.remove('hidden');
    canvasWrap.classList.remove('expanded');
    btn.textContent = '▼ 非表示';
  } else {
    // Hide UI
    uiUpper.classList.add('hidden');
    canvasWrap.classList.add('expanded');
    btn.textContent = '▲ 表示';
  }

  // Resize 3D canvas if active
  setTimeout(() => {
    if (renderer) {
      const wrap = document.getElementById('canvas-wrap');
      const width = wrap.offsetWidth;
      const height = wrap.offsetHeight;
      camera.aspect = width / height;
      camera.updateProjectionMatrix();
      renderer.setSize(width, height);
    }
  }, 300);
});

// Tab toggle button removed (Close button deleted)

start();
