<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>Neon Maze 3D – wgpu WebGL</title>
<link rel="stylesheet" href="style.css">
<style>
/* ── Warp overlay ── */
#warp-overlay {
  position:fixed; inset:0; pointer-events:none; z-index:50;
  opacity:0;
  mix-blend-mode: screen;
}
/* ── Swipe hint arrows (mobile) ── */
#swipe-hint {
  position:fixed; inset:0; pointer-events:none; z-index:8;
  display:flex; align-items:center; justify-content:center;
}
#swipe-hint .sh-up    { position:absolute; top:60px;    left:50%; transform:translateX(-50%); }
#swipe-hint .sh-down  { position:absolute; bottom:20px; left:50%; transform:translateX(-50%); }
#swipe-hint .sh-left  { position:absolute; left:12px;   top:50%;  transform:translateY(-50%); }
#swipe-hint .sh-right { position:absolute; right:12px;  top:50%;  transform:translateY(-50%); }
#swipe-hint span {
  font-size:2.2em; opacity:0.18; color:#0ff;
  text-shadow: 0 0 8px #0ff;
  font-family:monospace;
}
/* flash when swiped */
#swipe-hint span.flash { opacity:0.9; transition: opacity 0s; }

/* ── Level-clear banner ── */
#level-clear {
  display:none; position:fixed; inset:0; z-index:60;
  flex-direction:column; align-items:center; justify-content:center;
  background: rgba(0,0,10,0.78);
}
#level-clear h2 {
  color:#0ff; font-family:monospace; font-size:clamp(1.4em,5vw,2.2em);
  text-shadow: 0 0 20px #0ff, 0 0 40px #0ff;
  margin:0 0 10px; animation: pulse-text 0.7s infinite alternate;
}
#level-clear .sub {
  color:#f0f; font-family:monospace; font-size:clamp(0.85em,3vw,1.1em);
  text-shadow: 0 0 10px #f0f;
  margin-bottom:24px; text-align:center; padding:0 20px;
}
#level-clear button {
  background:transparent; border:2px solid #0ff;
  color:#0ff; font-size:clamp(1em,4vw,1.3em); padding:12px 32px;
  cursor:pointer; font-family:monospace;
  text-shadow:0 0 8px #0ff; box-shadow: 0 0 16px #0ff;
  transition: background 0.2s; border-radius:8px;
}
#level-clear button:active { background: rgba(0,255,255,0.2); }
@keyframes pulse-text { from{opacity:0.8} to{opacity:1; text-shadow:0 0 30px #0ff, 0 0 60px #0ff;} }

/* ── HUD extras ── */
#level-label { color:#f0f; font-family:monospace; font-size:1.1em;
  text-shadow:0 0 8px #f0f; }
#steps-label  { color:#0ff; font-family:monospace; font-size:1.1em;
  text-shadow:0 0 8px #0ff; }

/* ── Minimap ── */
#minimap {
  position:fixed; top:50px; right:8px; z-index:20;
  border:1px solid rgba(0,200,255,0.4);
  border-radius:4px;
  background:rgba(0,0,20,0.82);
  image-rendering:pixelated;
  width:144px; height:144px;
  box-shadow: 0 0 8px rgba(0,200,255,0.3);
}
</style>
</head>
<body>

<!-- Warp effect overlay -->
<div id="warp-overlay"></div>

<!-- Swipe direction hints -->
<div id="swipe-hint">
  <span class="sh-up"   id="sh-up">▲</span>
  <span class="sh-down" id="sh-down">▼</span>
  <span class="sh-left" id="sh-left">◀</span>
  <span class="sh-right"id="sh-right">▶</span>
</div>

<!-- HUD -->
<div id="hud">
  <span id="level-label">LV <b id="level">1</b></span>
  <span id="steps-label">歩数 <b id="steps">0</b></span>
  <span style="color:#888;font-family:monospace;font-size:0.85em;">合計 <b id="total-steps" style="color:#aaa">0</b></span>
  <span id="theme-label" style="color:#ff0; font-family:monospace; font-size:0.9em; text-shadow:0 0 6px #ff0; opacity:0.8;"></span>
  <button id="btn-reset">リセット</button>
</div>

<!-- Canvas -->
<div id="canvas-wrap">
  <canvas id="maze3d-canvas"></canvas>
</div>

<!-- Minimap (top-right overlay) -->
<canvas id="minimap" width="144" height="144"></canvas>

<!-- D-pad (desktop fallback, hidden on narrow screens) -->
<div id="dpad">
  <button class="db" id="db-up">▲</button>
  <div id="dpad-mid">
    <button class="db" id="db-left">◀</button>
    <div class="db" id="db-center"></div>
    <button class="db" id="db-right">▶</button>
  </div>
  <button class="db" id="db-down">▼</button>
</div>

<!-- Level-clear overlay -->
<div id="level-clear">
  <h2>🎉 LEVEL CLEAR! 🎉</h2>
  <p class="sub" id="clear-steps"></p>
  <button id="btn-next">NEXT LEVEL ▶</button>
</div>

<!-- Game Over overlay -->
<div id="game-over" style="display:none; position:fixed; inset:0; z-index:60;
     flex-direction:column; align-items:center; justify-content:center;
     background:rgba(20,0,0,0.85);">
  <h2 style="color:#f00; font-family:monospace; font-size:clamp(1.6em,6vw,2.5em);
       text-shadow:0 0 20px #f00, 0 0 40px #f00; margin:0 0 12px;
       animation:pulse-text 0.5s infinite alternate;">💀 CAUGHT! 💀</h2>
  <p style="color:#f88; font-family:monospace; font-size:clamp(0.9em,3vw,1.2em);
      text-shadow:0 0 8px #f44; margin-bottom:24px;">敵に捕まりました</p>
  <button id="btn-retry" style="background:transparent; border:2px solid #f00;
      color:#f00; font-size:clamp(1em,4vw,1.3em); padding:12px 32px;
      cursor:pointer; font-family:monospace; text-shadow:0 0 8px #f00;
      box-shadow:0 0 16px #f00; border-radius:8px;">RETRY ↺</button>
</div>

<!-- Loading overlay -->
<div id="loading" style="position:fixed;inset:0;background:#000008;display:flex;
     align-items:center;justify-content:center;z-index:999;
     color:#0ff;font-family:monospace;font-size:1.2em;text-align:center;">
  <div>
    <div class="spin"></div>
    <p style="margin-top:14px">LOADING wgpu WebGL…</p>
  </div>
</div>

<script type="module">
import init, * as wasm from './wasm/wasm_app.js';

// ─────────────────────────────────────────────────────────────────────────────
//  0 = forward  1 = turn-left  2 = turn-right  3 = backward
// ─────────────────────────────────────────────────────────────────────────────

const KEYMAP = {
  ArrowUp:0, KeyW:0, ArrowLeft:1, KeyA:1,
  ArrowRight:2, KeyD:2, ArrowDown:3, KeyS:3,
};
const SWIPE_MIN = 35; // px

let initialized = false;
let repeatId    = null;

const warpEl  = document.getElementById('warp-overlay');
const clearEl = document.getElementById('level-clear');
let clearShown   = false;
let gameOverShown = false;

// ── Resize canvas to fill available space ────────────────────────────────────
function resizeCanvas() {
  const c = document.getElementById('maze3d-canvas');
  const dpadH = window.innerWidth < 600 ? 0 : 160; // dpad hidden on mobile
  const hudH  = 44;
  c.width  = window.innerWidth;
  c.height = window.innerHeight - hudH - dpadH;
}

// ── Init ─────────────────────────────────────────────────────────────────────
async function start() {
  await init('./wasm/wasm_app_bg.wasm');
  resizeCanvas();
  await wasm.init_maze3d('maze3d-canvas');
  document.getElementById('loading').style.display = 'none';
  initialized = true;
  bindControls();
  requestAnimationFrame(loop);
}

// ── Game loop ─────────────────────────────────────────────────────────────────
function loop(ts) {
  if (!initialized) return;
  wasm.tick_maze3d(ts);
  document.getElementById('steps').textContent       = wasm.steps_maze3d();
  document.getElementById('total-steps').textContent = wasm.total_steps_maze3d();
  document.getElementById('level').textContent       = wasm.level_maze3d();
  const tEl = document.getElementById('theme-label');
  if (tEl) tEl.textContent = wasm.theme_name_maze3d();
  updateEffects();
  pollAudio();

  // ゲームオーバーチェック
  if (initialized && wasm.game_over_maze3d() && !gameOverShown) {
    gameOverShown = true;
    document.getElementById('game-over').style.display = 'flex';
  }

  drawMinimap();
  requestAnimationFrame(loop);
}

// ── Minimap ───────────────────────────────────────────────────────────────────
const minimapCanvas = document.getElementById('minimap');
const mmCtx = minimapCanvas.getContext('2d');
const MM_W = 9; // MAZE_W
const MM_H = 9; // MAZE_H
const CELL = 14; // px per cell (144 / 9 = 16 with 0 padding)
const N_FLAG = 1, E_FLAG = 2, S_FLAG = 4, W_FLAG = 8;

function drawMinimap() {
  if (!initialized) return;
  const mazeBytes = wasm.maze_data_maze3d();
  const px = wasm.player_x_maze3d();
  const pz = wasm.player_z_maze3d();
  const facing = wasm.player_facing_maze3d();

  mmCtx.clearRect(0, 0, 144, 144);
  mmCtx.fillStyle = 'rgba(0,0,20,0.0)';
  mmCtx.fillRect(0, 0, 144, 144);

  // Draw cells
  for (let cz = 0; cz < MM_H; cz++) {
    for (let cx = 0; cx < MM_W; cx++) {
      const x0 = cx * CELL + 1, y0 = cz * CELL + 1;
      const walls = mazeBytes[cz * MM_W + cx];
      // Visited floor (dim) vs player cell (bright)
      if (cx === px && cz === pz) {
        mmCtx.fillStyle = 'rgba(0,255,255,0.18)';
        mmCtx.fillRect(x0, y0, CELL-1, CELL-1);
      }
      // Goal cell highlight
      if (cx === MM_W-1 && cz === MM_H-1) {
        mmCtx.fillStyle = 'rgba(255,0,220,0.35)';
        mmCtx.fillRect(x0, y0, CELL-1, CELL-1);
      }
      // Start cell highlight
      if (cx === 0 && cz === 0) {
        mmCtx.fillStyle = 'rgba(0,255,100,0.25)';
        mmCtx.fillRect(x0, y0, CELL-1, CELL-1);
      }
      // Draw walls as bright lines
      mmCtx.strokeStyle = 'rgba(0,200,255,0.85)';
      mmCtx.lineWidth = 1.5;
      if (walls & N_FLAG) { mmCtx.beginPath(); mmCtx.moveTo(x0, y0); mmCtx.lineTo(x0+CELL-1, y0); mmCtx.stroke(); }
      if (walls & S_FLAG) { mmCtx.beginPath(); mmCtx.moveTo(x0, y0+CELL-1); mmCtx.lineTo(x0+CELL-1, y0+CELL-1); mmCtx.stroke(); }
      if (walls & W_FLAG) { mmCtx.beginPath(); mmCtx.moveTo(x0, y0); mmCtx.lineTo(x0, y0+CELL-1); mmCtx.stroke(); }
      if (walls & E_FLAG) { mmCtx.beginPath(); mmCtx.moveTo(x0+CELL-1, y0); mmCtx.lineTo(x0+CELL-1, y0+CELL-1); mmCtx.stroke(); }
    }
  }

  // ── Player: view cone + arrow ─────────────────────────────────────────────
  // facingIdx: 0=N 1=E 2=S 3=W  →  angle in canvas (Y-down, N=up=−π/2)
  const facingIdx = facing === 1 ? 0 : facing === 2 ? 1 : facing === 4 ? 2 : 3;
  const facingAngle = [-Math.PI/2, 0, Math.PI/2, Math.PI][facingIdx];
  const cx2 = px * CELL + CELL/2 + 1;
  const cy2 = pz * CELL + CELL/2 + 1;

  // View cone (60° sector, 2.5 cells reach)
  const coneAngle = Math.PI / 3;  // 60°
  const coneR = CELL * 2.2;
  mmCtx.save();
  mmCtx.fillStyle = 'rgba(255,220,0,0.13)';
  mmCtx.beginPath();
  mmCtx.moveTo(cx2, cy2);
  mmCtx.arc(cx2, cy2, coneR, facingAngle - coneAngle/2, facingAngle + coneAngle/2);
  mmCtx.closePath();
  mmCtx.fill();
  // Cone outline
  mmCtx.strokeStyle = 'rgba(255,220,0,0.5)';
  mmCtx.lineWidth = 1;
  mmCtx.beginPath();
  mmCtx.moveTo(cx2, cy2);
  mmCtx.lineTo(cx2 + Math.cos(facingAngle - coneAngle/2)*coneR,
               cy2 + Math.sin(facingAngle - coneAngle/2)*coneR);
  mmCtx.moveTo(cx2, cy2);
  mmCtx.lineTo(cx2 + Math.cos(facingAngle + coneAngle/2)*coneR,
               cy2 + Math.sin(facingAngle + coneAngle/2)*coneR);
  mmCtx.stroke();
  mmCtx.restore();

  // Player dot
  mmCtx.save();
  mmCtx.fillStyle = '#fff';
  mmCtx.shadowColor = '#0ff';
  mmCtx.shadowBlur = 6;
  mmCtx.beginPath();
  mmCtx.arc(cx2, cy2, 3.5, 0, Math.PI*2);
  mmCtx.fill();
  mmCtx.restore();

  // Direction arrow (bright yellow, larger)
  const tipX = cx2 + Math.cos(facingAngle) * 5.5;
  const tipY = cy2 + Math.sin(facingAngle) * 5.5;
  const baseL = facingAngle + Math.PI*0.75;
  const baseR = facingAngle - Math.PI*0.75;
  mmCtx.save();
  mmCtx.fillStyle = '#ffe040';
  mmCtx.shadowColor = '#ffc000';
  mmCtx.shadowBlur = 5;
  mmCtx.beginPath();
  mmCtx.moveTo(tipX, tipY);
  mmCtx.lineTo(cx2 + Math.cos(baseL)*4, cy2 + Math.sin(baseL)*4);
  mmCtx.lineTo(cx2 + Math.cos(baseR)*4, cy2 + Math.sin(baseR)*4);
  mmCtx.closePath();
  mmCtx.fill();
  mmCtx.restore();

  // Compass labels (N/S/E/W)
  mmCtx.save();
  mmCtx.font = 'bold 8px monospace';
  mmCtx.textAlign = 'center';
  mmCtx.textBaseline = 'middle';
  const compassLabels = [['N',72,5],['S',72,139],['W',5,72],['E',139,72]];
  for (const [lbl, lx, ly] of compassLabels) {
    // Highlight the label that matches current facing
    const isActive = (lbl==='N'&&facingIdx===0)||(lbl==='E'&&facingIdx===1)||
                     (lbl==='S'&&facingIdx===2)||(lbl==='W'&&facingIdx===3);
    mmCtx.fillStyle = isActive ? '#ffe040' : 'rgba(0,200,255,0.55)';
    mmCtx.shadowColor = isActive ? '#ffc000' : 'transparent';
    mmCtx.shadowBlur  = isActive ? 4 : 0;
    mmCtx.fillText(lbl, lx, ly);
  }
  mmCtx.restore();

  // Goal dot (magenta)
  mmCtx.save();
  mmCtx.fillStyle = '#ff00dd';
  mmCtx.shadowColor = '#ff00dd';
  mmCtx.shadowBlur = 4;
  mmCtx.beginPath();
  mmCtx.arc((MM_W-1)*CELL + CELL/2 + 1, (MM_H-1)*CELL + CELL/2 + 1, 3, 0, Math.PI*2);
  mmCtx.fill();
  mmCtx.restore();

  // Enemy dot (red, with glow)
  const ex = wasm.enemy_x_maze3d();
  const ez = wasm.enemy_z_maze3d();
  if (ex >= 0) {
    mmCtx.save();
    mmCtx.fillStyle = '#ff2020';
    mmCtx.shadowColor = '#ff0000';
    mmCtx.shadowBlur = 6;
    mmCtx.beginPath();
    mmCtx.arc(ex * CELL + 1, ez * CELL + 1, 3.5, 0, Math.PI*2);
    mmCtx.fill();
    mmCtx.restore();
  }
}

// ── Visual effects ─────────────────────────────────────────────────────────────
function updateEffects() {
  const w = wasm.warp_maze3d();
  if (w > 0.01) {
    warpEl.style.opacity    = w * 0.75;
    warpEl.style.background =
      `radial-gradient(ellipse at center,
        rgba(160,0,255,${w*0.5}) 0%,
        rgba(0,180,255,${w*0.25}) 50%,
        rgba(255,0,200,${w*0.55}) 100%)`;
    warpEl.style.boxShadow = `inset 0 0 ${20+w*80}px rgba(0,255,255,${w*0.7})`;
  } else {
    warpEl.style.opacity = '0';
  }
  if (wasm.warp_done_maze3d() && !clearShown) {
    clearShown = true;
    document.getElementById('clear-steps').textContent =
      `このレベル: ${wasm.steps_maze3d()} 歩 ／ 合計: ${wasm.total_steps_maze3d()} 歩`;
    clearEl.style.display = 'flex';
  }
}

// ── Single move ───────────────────────────────────────────────────────────────
function doMove(action) {
  if (!initialized) return;
  wasm.move_maze3d(action);
}

// ── Repeat while held ─────────────────────────────────────────────────────────
function startRepeat(action) {
  if (!initialized) return;
  stopRepeat();
  doMove(action);
  repeatId = setInterval(() => doMove(action), 200);
}
function stopRepeat() {
  if (repeatId !== null) { clearInterval(repeatId); repeatId = null; }
}

// ── Flash swipe hint ──────────────────────────────────────────────────────────
const shMap = [
  document.getElementById('sh-up'),
  document.getElementById('sh-left'),
  document.getElementById('sh-right'),
  document.getElementById('sh-down'),
];
function flashHint(action) {
  const el = shMap[action];
  if (!el) return;
  el.classList.add('flash');
  setTimeout(() => { el.classList.remove('flash'); el.style.transition='opacity 0.4s'; }, 80);
}

// ── Bind all controls ─────────────────────────────────────────────────────────
function bindControls() {

  // ── Keyboard ────────────────────────────────────────────────────────────────
  document.addEventListener('keydown', e => {
    if (e.code in KEYMAP) { e.preventDefault(); doMove(KEYMAP[e.code]); }
  });

  // ── D-pad (desktop) ─────────────────────────────────────────────────────────
  const dbMap = [
    ['db-up', 0], ['db-left', 1], ['db-right', 2], ['db-down', 3],
  ];
  for (const [id, action] of dbMap) {
    const btn = document.getElementById(id);
    btn.addEventListener('mousedown',  () => { ensureAudio(); startRepeat(action); });
    btn.addEventListener('mouseup',    stopRepeat);
    btn.addEventListener('mouseleave', stopRepeat);
    btn.addEventListener('touchstart', e => { e.preventDefault(); startRepeat(action); }, {passive:false});
    btn.addEventListener('touchend',   e => { e.preventDefault(); stopRepeat(); },         {passive:false});
  }

  // ── Reset / Next-level buttons ───────────────────────────────────────────────
  document.getElementById('btn-reset').addEventListener('click', () => {
    wasm.reset_maze3d();
    clearEl.style.display = 'none';
    document.getElementById('game-over').style.display = 'none';
    clearShown = false;
    gameOverShown = false;
    warpEl.style.opacity = '0';
  });
  document.getElementById('btn-next').addEventListener('click', () => {
    wasm.next_level_maze3d();
    clearEl.style.display = 'none';
    clearShown = false;
    warpEl.style.opacity = '0';
  });

  document.getElementById('btn-retry').addEventListener('click', () => {
    wasm.reset_maze3d();
    document.getElementById('game-over').style.display = 'none';
    gameOverShown = false;
    clearShown = false;
    warpEl.style.opacity = '0';
  });

  // ── Swipe gesture (全画面 / full-screen) ────────────────────────────────────
  //   上スワイプ → 前進  下スワイプ → 後退  左スワイプ → 左折  右スワイプ → 右折
  let swipeX0 = 0, swipeY0 = 0, swipeMoved = false;

  document.addEventListener('touchstart', e => {
    // level-clear overlay のボタンには干渉しない
    if (e.target.closest('#level-clear, #hud, #dpad')) return;
    ensureAudio();
    swipeX0 = e.touches[0].clientX;
    swipeY0 = e.touches[0].clientY;
    swipeMoved = false;
  }, {passive: true});

  document.addEventListener('touchmove', e => {
    if (e.target.closest('#level-clear, #hud, #dpad')) return;
    const dx = e.touches[0].clientX - swipeX0;
    const dy = e.touches[0].clientY - swipeY0;
    if (!swipeMoved && (Math.abs(dx) > SWIPE_MIN || Math.abs(dy) > SWIPE_MIN)) {
      swipeMoved = true;
      let action;
      if (Math.abs(dx) > Math.abs(dy)) {
        action = dx < 0 ? 1 : 2;   // left=turn-left  right=turn-right
      } else {
        action = dy < 0 ? 0 : 3;   // up=forward  down=backward
      }
      flashHint(action);
      doMove(action);
    }
  }, {passive: true});

  document.addEventListener('touchend', () => { swipeMoved = false; }, {passive: true});
}

// ── Web Audio API サウンドシステム ────────────────────────────────────────────
let audioCtx = null;
let ambientNode = null;
let ambientGain = null;

function ensureAudio() {
  if (!audioCtx) {
    audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    startAmbient();
  }
  if (audioCtx.state === 'suspended') audioCtx.resume();
}

// 足音 (ノイズバースト + フィルター)
function playStep(isLeft) {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const bufSize = audioCtx.sampleRate * 0.05; // 50ms
  const buf = audioCtx.createBuffer(1, bufSize, audioCtx.sampleRate);
  const data = buf.getChannelData(0);
  for (let i = 0; i < bufSize; i++) data[i] = (Math.random() * 2 - 1);

  const src = audioCtx.createBufferSource();
  src.buffer = buf;

  // ハイパスフィルター（足音らしさ）
  const hpf = audioCtx.createBiquadFilter();
  hpf.type = 'highpass';
  hpf.frequency.value = isLeft ? 320 : 280; // 左右で微妙に違う

  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.18, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.05);

  src.connect(hpf); hpf.connect(gain); gain.connect(audioCtx.destination);
  src.start(t); src.stop(t + 0.06);
}

// 壁衝突音（低いドン）
function playWallHit() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(90, t);
  osc.frequency.exponentialRampToValueAtTime(40, t + 0.12);

  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.45, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.18);

  // ローパスフィルターでこもらせる
  const lpf = audioCtx.createBiquadFilter();
  lpf.type = 'lowpass';
  lpf.frequency.value = 200;

  osc.connect(lpf); lpf.connect(gain); gain.connect(audioCtx.destination);
  osc.start(t); osc.stop(t + 0.2);
}

// レベルクリア（上昇アルペジオ: C5-E5-G5-C6）
function playLevelClear() {
  if (!audioCtx) return;
  const notes = [523.25, 659.25, 783.99, 1046.5]; // C5, E5, G5, C6
  notes.forEach((freq, i) => {
    const t = audioCtx.currentTime + i * 0.13;
    const osc = audioCtx.createOscillator();
    osc.type = 'triangle';
    osc.frequency.value = freq;

    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.0, t);
    gain.gain.linearRampToValueAtTime(0.3, t + 0.02);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.35);

    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(t); osc.stop(t + 0.4);
  });
}

// ゴール付近（上昇音）
function playGoalNear() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  osc.type = 'sine';
  osc.frequency.setValueAtTime(440, t);
  osc.frequency.linearRampToValueAtTime(660, t + 0.15);

  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.15, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);

  osc.connect(gain); gain.connect(audioCtx.destination);
  osc.start(t); osc.stop(t + 0.3);
}

// アンビエントドローン（ダンジョン空間音）
function startAmbient() {
  if (!audioCtx || ambientNode) return;

  // 低周波ドローン（2重重ね）
  const freqs = [55, 55.5]; // 微妙なデチューンでうねりを作る
  ambientGain = audioCtx.createGain();
  ambientGain.gain.setValueAtTime(0.0, audioCtx.currentTime);
  ambientGain.gain.linearRampToValueAtTime(0.06, audioCtx.currentTime + 3.0);
  ambientGain.connect(audioCtx.destination);

  freqs.forEach(freq => {
    const osc = audioCtx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.value = freq;

    const lpf = audioCtx.createBiquadFilter();
    lpf.type = 'lowpass';
    lpf.frequency.value = 180;
    lpf.Q.value = 2;

    osc.connect(lpf); lpf.connect(ambientGain);
    osc.start();
  });
  ambientNode = ambientGain;
}

// 音声イベントポーリング（毎フレーム呼ぶ）
function pollAudio() {
  if (!initialized) return;
  const ev = wasm.audio_event_maze3d();
  if (ev === 0) return;
  ensureAudio();
  switch(ev) {
    case 1: playStep(wasm.audio_step_parity_maze3d()); break;
    case 2: playWallHit(); break;
    case 3: playLevelClear(); break;
    case 4: playGoalNear(); break;
    case 5: playEnemyNear(); break;
    case 6: playGameOver();  break;
  }
}

// 敵接近音（不気味なパルス）
function playEnemyNear() {
  if (!audioCtx) return;
  const t = audioCtx.currentTime;
  const osc = audioCtx.createOscillator();
  osc.type = 'sawtooth';
  osc.frequency.setValueAtTime(120, t);
  osc.frequency.exponentialRampToValueAtTime(80, t + 0.2);
  const gain = audioCtx.createGain();
  gain.gain.setValueAtTime(0.25, t);
  gain.gain.exponentialRampToValueAtTime(0.001, t + 0.25);
  const lpf = audioCtx.createBiquadFilter();
  lpf.type = 'lowpass'; lpf.frequency.value = 300;
  osc.connect(lpf); lpf.connect(gain); gain.connect(audioCtx.destination);
  osc.start(t); osc.stop(t + 0.3);
}

// ゲームオーバー音（下降音）
function playGameOver() {
  if (!audioCtx) return;
  const notes = [392, 311, 247, 185];
  notes.forEach((freq, i) => {
    const t = audioCtx.currentTime + i * 0.18;
    const osc = audioCtx.createOscillator();
    osc.type = 'sawtooth';
    osc.frequency.value = freq;
    const gain = audioCtx.createGain();
    gain.gain.setValueAtTime(0.3, t);
    gain.gain.exponentialRampToValueAtTime(0.001, t + 0.4);
    osc.connect(gain); gain.connect(audioCtx.destination);
    osc.start(t); osc.stop(t + 0.45);
  });
}

start();
</script>
