<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Neon Maze</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #020212;
      color: #00eeff;
      font-family: 'Courier New', monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100dvh;
      overflow: hidden;
      touch-action: none;
    }

    #info {
      width: 100%;
      padding: 8px 16px;
      display: flex;
      justify-content: space-between;
      font-size: 15px;
      color: #55aacc;
      flex-shrink: 0;
      text-shadow: 0 0 8px cyan;
    }

    #canvas-wrap {
      flex: 1 1 auto;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 0;
      width: 100%;
    }

    canvas {
      display: block;
      image-rendering: pixelated;
    }

    #controls {
      flex-shrink: 0;
      display: grid;
      grid-template-areas:
        ". up ."
        "left . right"
        ". down ."
        "reset reset reset";
      grid-template-columns: 1fr 1fr 1fr;
      grid-template-rows: auto auto auto auto;
      gap: 6px;
      padding: 8px 16px 12px;
      width: 100%;
      max-width: 340px;
    }

    .btn {
      background: rgba(0, 120, 200, 0.12);
      border: 2px solid #0088cc;
      color: #00ddff;
      font-size: 28px;
      border-radius: 12px;
      padding: 10px 0;
      cursor: pointer;
      user-select: none;
      -webkit-user-select: none;
      text-shadow: 0 0 10px cyan;
      box-shadow: 0 0 12px rgba(0,150,255,0.25);
      transition: background 0.08s;
      text-align: center;
    }
    .btn:active, .btn.pressed {
      background: rgba(0, 180, 255, 0.35);
      box-shadow: 0 0 20px rgba(0,200,255,0.5);
    }

    #btn-up    { grid-area: up; }
    #btn-down  { grid-area: down; }
    #btn-left  { grid-area: left; }
    #btn-right { grid-area: right; }
    #btn-reset {
      grid-area: reset;
      font-size: 16px;
      margin-top: 2px;
      border-color: #aa00cc;
      color: #ee44ff;
      text-shadow: 0 0 10px magenta;
      box-shadow: 0 0 12px rgba(200,0,255,0.25);
    }
    #btn-reset:active {
      background: rgba(200,0,255,0.3);
    }

    #loading {
      position: fixed;
      inset: 0;
      background: #020212;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 20px;
      font-size: 20px;
      text-shadow: 0 0 10px cyan;
      z-index: 10;
    }
    .spinner {
      width: 48px; height: 48px;
      border: 4px solid #0033aa;
      border-top-color: cyan;
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }
    @keyframes spin { to { transform: rotate(360deg); } }
  </style>
</head>
<body>

  <div id="loading">
    <div class="spinner"></div>
    <div>Loading Neon Maze...</div>
  </div>

  <div id="info">
    <span>🟡 moves: <span id="moves">0</span></span>
    <span>⏱ <span id="timer">0.0</span>s</span>
  </div>

  <div id="canvas-wrap">
    <canvas id="game-canvas"></canvas>
  </div>

  <div id="controls">
    <button class="btn" id="btn-up">↑</button>
    <button class="btn" id="btn-left">←</button>
    <button class="btn" id="btn-right">→</button>
    <button class="btn" id="btn-down">↓</button>
    <button class="btn" id="btn-reset">🔄 RESET</button>
  </div>

  <script>
    let game = null;
    const canvas = document.getElementById('game-canvas');
    const movesEl = document.getElementById('moves');
    const timerEl = document.getElementById('timer');

    function resizeCanvas() {
      const wrap = document.getElementById('canvas-wrap');
      const size = Math.min(wrap.clientWidth, wrap.clientHeight);
      canvas.width = size;
      canvas.height = size;
    }

    function gameLoop(ts) {
      if (game) {
        game.tick(ts);
        game.render('game-canvas');
        movesEl.textContent = game.get_moves();
        timerEl.textContent = game.get_elapsed().toFixed(1);
      }
      requestAnimationFrame(gameLoop);
    }

    function move(dx, dy) {
      if (game) game.move_player(dx, dy);
    }

    function resetGame() {
      if (game) game.reset();
    }

    // Button helpers
    function setupBtn(id, action) {
      const el = document.getElementById(id);
      el.addEventListener('touchstart', (e) => {
        e.preventDefault();
        el.classList.add('pressed');
        action();
      }, { passive: false });
      el.addEventListener('touchend', () => el.classList.remove('pressed'), { passive: true });
      el.addEventListener('mousedown', () => { el.classList.add('pressed'); action(); });
      el.addEventListener('mouseup', () => el.classList.remove('pressed'));
    }

    setupBtn('btn-up',    () => move(0, -1));
    setupBtn('btn-down',  () => move(0,  1));
    setupBtn('btn-left',  () => move(-1, 0));
    setupBtn('btn-right', () => move( 1, 0));
    setupBtn('btn-reset', () => resetGame());

    // Keyboard
    document.addEventListener('keydown', (e) => {
      switch (e.key) {
        case 'ArrowUp':    case 'w': case 'W': move(0, -1); break;
        case 'ArrowDown':  case 's': case 'S': move(0,  1); break;
        case 'ArrowLeft':  case 'a': case 'A': move(-1, 0); break;
        case 'ArrowRight': case 'd': case 'D': move( 1, 0); break;
        case 'r': case 'R': resetGame(); break;
      }
    });

    window.addEventListener('resize', resizeCanvas);

    async function init() {
      resizeCanvas();
      try {
        const wasmModule = await import('./maze/wasm_app.js');
        await wasmModule.default();
        game = new wasmModule.NeonMaze();
        document.getElementById('loading').style.display = 'none';
        requestAnimationFrame(gameLoop);
      } catch (e) {
        document.getElementById('loading').innerHTML =
          '<div style="color:#ff4444">読み込みエラー</div><div style="font-size:13px;margin-top:10px;color:#888">' + e + '</div>';
      }
    }

    window.addEventListener('load', init);
  </script>
</body>
</html>
