[package]
name = "wasm_app"
version.workspace = true
edition.workspace = true
authors.workspace = true

[dependencies]
game_logic = { path = "../game_logic" }
wasm-bindgen = { workspace = true }
web-sys = { workspace = true, features = ["Window", "Document", "HtmlCanvasElement", "WebGlRenderingContext", "console"] }
js-sys = { workspace = true }
cgmath = { workspace = true }
glam = { workspace = true }
log = { workspace = true }
wasm-bindgen-futures = "0.4"
console_error_panic_hook = "0.1"

[lib]
crate-type = ["cdylib"]

[profile.release]
opt-level = "z"
lto = true
